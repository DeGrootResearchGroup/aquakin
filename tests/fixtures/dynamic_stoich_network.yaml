network:
  name: dynamic_stoich_demo
  version: "1.0"
  description: >
    Tiny test network with parameter-dependent stoichiometry. Substrate S
    is consumed to produce biomass X at a yield Y; the stoichiometric
    coefficient for S is the symbolic expression "-1/Y", letting Y be
    calibrated together with the kinetic rate constant mu.
  references: []

species:
  - {name: S, default_concentration: 100.0, units: "g/m3"}
  - {name: X, default_concentration: 50.0,  units: "g/m3"}

conditions:
  - {name: T, default: 293.15}

parameters:
  mu: {value: 1.0, units: "1/d", bounds: [0.01, 10.0], transform: positive_log}
  Y:  {value: 0.5, units: "-",   bounds: [0.05, 0.95], transform: logit}

reactions:
  - name: growth
    description: "Substrate-limited growth of X on S with yield Y."
    rate: "mu * [S] * [X]"
    stoichiometry:
      S: "-1/Y"
      X: 1.0
