# Build and publish aquakin to PyPI via PyPI Trusted Publishing (OIDC).
#
# No API tokens are stored: the publish jobs mint a short-lived OIDC token
# (`id-token: write`) that PyPI / TestPyPI exchange for an upload token, and the
# upload carries PEP 740 provenance attestations (generated by the publish
# action). Publishing is gated behind a protected GitHub Environment so the
# owner can require a manual approval before anything leaves the repo.
#
# Triggers:
#   * Publishing a GitHub Release  -> build, then upload to real PyPI.
#   * Manual `workflow_dispatch`   -> build, then upload to TestPyPI (the
#                                     rehearsal; run this before the first real
#                                     release).
#
# ---------------------------------------------------------------------------
# ONE-TIME MANUAL SETUP (repo owner; cannot be automated -- needs a PyPI login):
#
#   1. Create two GitHub Environments (Settings -> Environments): `pypi` and
#      `testpypi`. Protect at least `pypi` (require a reviewer / restrict to the
#      release tag) so a publish waits for approval.
#   2. Register aquakin as a Trusted Publisher on each index:
#        - https://pypi.org/manage/account/publishing/
#        - https://test.pypi.org/manage/account/publishing/
#      For each, add a GitHub publisher with:
#        owner        = DeGrootResearchGroup
#        repository   = aquakin
#        workflow     = release.yml
#        environment  = pypi        (on PyPI)   /   testpypi   (on TestPyPI)
#   3. Rehearse: Actions -> "Release" -> "Run workflow" (uploads to TestPyPI),
#      then `pip install -i https://test.pypi.org/simple/ aquakin` in a clean
#      venv to confirm it installs.
#   4. Release for real: tag `vX.Y.Z` (matching `aquakin.__version__`) and cut a
#      GitHub Release from it; this workflow then publishes to PyPI.
# ---------------------------------------------------------------------------

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

# Least privilege by default; the publish jobs opt into `id-token: write`.
permissions:
  contents: read

jobs:
  # ---- Build + validate the distributions (both triggers) -------------------
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Verify the release tag matches aquakin.__version__
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          import os, re, pathlib, sys
          src = pathlib.Path("aquakin/__init__.py").read_text()
          version = re.search(r'^__version__\s*=\s*"([^"]+)"', src, re.M).group(1)
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              sys.exit(
                  f"::error::release tag {tag!r} does not match "
                  f"aquakin.__version__ {version!r} (expected tag {expected!r})"
              )
          print(f"tag {tag} matches version {version}")
          PY

      - name: Verify bundled model data landed in the sdist AND the wheel
        run: |
          python - <<'PY'
          import glob, sys, tarfile, zipfile
          sdist = glob.glob("dist/*.tar.gz")[0]
          wheel = glob.glob("dist/*.whl")[0]
          sd = tarfile.open(sdist).getnames()
          wh = zipfile.ZipFile(wheel).namelist()
          for label, names in (("sdist", sd), ("wheel", wh)):
              yaml = [n for n in names if n.endswith(".yaml")]
              csv = [n for n in names if n.endswith(".csv")]
              if not yaml or not csv:
                  sys.exit(f"::error::{label} is missing bundled data: "
                           f"{len(yaml)} yaml, {len(csv)} csv")
              print(f"{label}: {len(yaml)} yaml, {len(csv)} csv")
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ---- Rehearsal: publish to TestPyPI on a manual run -----------------------
  publish-testpypi:
    name: Publish to TestPyPI (rehearsal)
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/p/aquakin
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true

  # ---- Real publish: PyPI on a published GitHub Release ---------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/aquakin
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
