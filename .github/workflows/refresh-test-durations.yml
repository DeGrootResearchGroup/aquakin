name: Refresh test durations

# Keeps `.test_durations` fresh so the validation suite's pytest-split shard
# balance does not silently drift as tests are added/removed. `.test_durations`
# holds the per-test timings for exactly the `-m validation` set, which the
# validation job in ci.yml splits across runners *balanced by duration*; without
# a refresh, new validation tests get no recorded timing and the shards skew.
#
# Why a scheduled job rather than a step on every push to main: regenerating the
# timings means re-running the (heavy) validation suite, which the push-to-main
# `validation` job already does for pass/fail. pytest-split uses one path for
# BOTH reading the balanced split and writing stored durations, so those shards
# cannot also emit clean per-shard timing files without unbalancing themselves.
# A separate measurement pass is therefore required; running it weekly (instead
# of on every merge) avoids doubling the validation compute on the critical path
# while still keeping the file current. Trigger it by hand any time via the
# Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: refresh-test-durations
  cancel-in-progress: true

env:
  OMP_NUM_THREADS: "1"
  XLA_FLAGS: "--xla_cpu_multi_thread_eigen=false"

jobs:
  refresh:
    name: re-measure and commit .test_durations
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write          # to commit the refreshed file back to main
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # matches the validation job in ci.yml
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Measure validation durations (fresh process per shard)
        # Re-run the validation set in 4 sequential shards, each a FRESH process
        # so peak memory stays ~1/4 of the whole suite (a single process running
        # all of them OOM-reclaims the 16 GB runner -- the same reason ci.yml
        # shards this suite). Each shard writes ONLY the tests it ran to its own
        # `.dur_<g>.json`: pointing `--durations-path` at a non-existent file
        # makes pytest-split fall back to a deterministic even-by-count split
        # (no pytest-randomly here), so the 4 shards are a disjoint cover and the
        # union is the complete, freshly-timed set -- no stale entries for
        # deleted tests, unlike an in-place merge.
        run: |
          rm -f .dur_*.json
          for g in 1 2 3 4; do
            echo "::group::validation durations shard ${g}/4"
            pytest -m validation -q -n 1 \
              --splits 4 --group "${g}" \
              --store-durations --durations-path ".dur_${g}.json" \
              --timeout=900 --timeout-method=thread --max-worker-restart=0
            echo "::endgroup::"
          done

      - name: Merge shard timings into .test_durations
        run: |
          python - <<'PY'
          import glob, json
          merged = {}
          for f in sorted(glob.glob(".dur_*.json")):
              merged.update(json.load(open(f)))
          # Same dump options pytest-split uses (sort_keys + indent=4, no trailing
          # newline), so an unchanged-timings run is a true no-op, not format churn.
          json.dump(merged, open(".test_durations", "w"), sort_keys=True, indent=4)
          print(f"Refreshed .test_durations with {len(merged)} entries")
          PY
          rm -f .dur_*.json

      - name: Commit refreshed durations if changed
        # `[skip ci]` in the message keeps the resulting push from re-triggering
        # the CI workflow (GitHub honours the skip keyword for pushes).
        run: |
          if git diff --quiet -- .test_durations; then
            echo "No change in .test_durations -- nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .test_durations
          git commit -m "chore(ci): refresh .test_durations [skip ci]"
          git push
