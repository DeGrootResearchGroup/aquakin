name: CI

on:
  push:
    branches: [main]
  pull_request:
    # `labeled` is added (on top of the defaults) so applying the `full-ci` label
    # to an open PR immediately triggers the opt-in slow+validation run, without
    # needing a fresh push. The fast gate / smoke jobs skip the bare `labeled`
    # action (they already ran on the latest commit).
    types: [opened, synchronize, reopened, labeled]
  schedule:
    # Weekly (Mon 07:23 UTC): refresh `.test_durations` so the slow/validation
    # pytest-split shards stay duration-balanced as tests are added. Only the
    # refresh-durations / commit-durations jobs run on this event; everything
    # else is gated off it.
    - cron: "23 7 * * 1"
  # Manual trigger for the same refresh (e.g. to populate the slow-test durations
  # immediately instead of waiting for the weekly cron).
  workflow_dispatch:

# Concurrency groups, by event:
#  - push to main      -> keyed on the immutable commit SHA, never cancelled, so a
#    rapid second merge cannot cancel the first merge's slow/validation run and let
#    a regression land unverified.
#  - PR `labeled`      -> its OWN group (`fullci-<ref>`), SEPARATE from the fast
#    gate. Applying the `full-ci` label spins up the slow+validation run
#    immediately and independently: being a different group it can neither cancel
#    the fast gate (a required check) nor be queued behind / starved by it.
#    (The previous design shared the fast gate's group with `cancel-in-progress:
#    false`, so the label run queued behind the in-progress fast gate and any
#    later PR event then superseded the single pending slot -- full-ci silently
#    never ran. Issue: PR #405.)
#  - other PR events   -> keyed on the ref, cancel-in-progress, so a new push to a
#    PR branch cancels its own superseded fast-gate runs.
# cancel-in-progress is true for every PR event: in the fast-gate group a new push
# supersedes the old run; in the `fullci-<ref>` group a re-applied label supersedes
# the prior full-ci run (a fresh run, never queued). It is false only for push.
concurrency:
  group: >-
    ${{ github.workflow }}-${{
      (github.event_name == 'pull_request' && github.event.action == 'labeled')
      && format('fullci-{0}', github.ref)
      || (github.event_name == 'push' && github.sha)
      || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

# Pin XLA/BLAS to a single thread per process so pytest-xdist workers do not
# oversubscribe the runner's CPUs (each JAX process otherwise grabs every core,
# and N workers x M cores thrashes). With this, -n auto scales cleanly.
env:
  OMP_NUM_THREADS: "1"
  XLA_FLAGS: "--xla_cpu_multi_thread_eigen=false"

jobs:
  # ---- Fast merge gate: unit + fast integration (sharded) ---------------------
  # Runs on every pull request AND every push to main. Excludes the multi-minute
  # stiff/plant solves (marked `slow`) and the published-data `validation` suite,
  # which run in full on merge to main (see the `slow` and `validation` jobs).
  #
  # SHARDED across fresh processes (pytest-split), exactly like the slow/validation
  # suites and for the same reason: the fast suite grew to ~1300 tests / ~15-39 min
  # and a single long-lived run accumulated XLA-compilation cache + live JAX
  # buffers until an xdist worker was OOM-killed by the 16 GB runner (a worker
  # *crash* on a random lightweight test, varying per run) and/or it hit the time
  # ceiling -- intermittent red on the required gate with no real regression.
  # Splitting across N fresh jobs keeps each job's accumulated footprint to ~1/N
  # (no OOM) and runs the shards in parallel (well under the ceiling). The
  # per-shard jobs are NOT the required check -- the `fast-gate` aggregator below
  # is (a stable name that survives shard-count changes); update branch protection
  # to require `fast gate` instead of the old per-version `fast tests (...)` jobs.
  test:
    name: fast tests (py${{ matrix.python-version }} shard ${{ matrix.group }}/4)
    # Push + PR only; the `schedule` cron and manual `workflow_dispatch` run just
    # the refresh jobs. A bare `labeled` event (someone applied a label) does not
    # re-run the gate -- it already ran on the latest commit, and re-running would
    # briefly un-green the required check.
    if: >-
      github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
      && github.event.action != 'labeled'
    runs-on: ubuntu-latest
    # Each shard is ~1/4 of the suite in a fresh process, so its memory stays well
    # under the runner limit and its wall time well under this ceiling; 25 min is
    # a safety margin over the few-minute real cost.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Python 3.10 is install-compatible (requires-python >= 3.10) but excluded
        # from CI: its heavier jaxlib build ran close to the hosted runner's
        # resource/time limits and was intermittently killed, while 3.11/3.12
        # stayed green and the suite passed locally on 3.10.
        python-version: ["3.11", "3.12"]
        group: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run fast tests shard (unit + fast integration)
        # --timeout fires inside a worker if a single test deadlocks, naming the
        # offending test instead of hanging silently. --max-worker-restart=0 makes
        # a crashed worker fail the run immediately. `-n auto` spreads the shard's
        # tests across workers; with ~1/4 of the suite per shard each worker runs
        # far fewer tests, so the accumulated XLA/JAX memory stays bounded.
        # pytest-split partitions the marked set across the 4 shards -- by recorded
        # duration where available in `.test_durations` (currently the slow/
        # validation tests), else evenly by count, which is what bounds the memory.
        run: >-
          pytest -m "not validation and not slow" -q -n auto
          --splits 4 --group ${{ matrix.group }}
          --durations=15 --timeout=600 --timeout-method=thread
          --max-worker-restart=0

  # ---- Fast-gate aggregator: the single required status check ------------------
  # Sharding renames the per-shard jobs (and their count may change), so make ONE
  # stable job the required check. It succeeds iff every fast shard succeeded (or
  # was skipped -- a bare `labeled` event skips the gate, which must not block).
  # `needs.test.result` is the aggregate of the matrix: success only if all shards
  # pass, failure/cancelled if any did. Always runs on push/PR (never schedule/
  # dispatch) so it always reports a concrete status for branch protection.
  fast-gate:
    name: fast gate
    needs: test
    if: >-
      always() && github.event_name != 'schedule'
      && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Require all fast shards to pass
        run: |
          result="${{ needs.test.result }}"
          echo "fast-test matrix result: $result"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            exit 0
          fi
          echo "::error::fast-test shards did not all pass (result: $result)"
          exit 1

  # ---- Full slow integration suite: merge-to-main + opt-in on a PR ------------
  # The multi-minute stiff/plant solves. Runs on every push to main so a
  # regression the PR's fast gate could not catch surfaces within minutes of
  # landing -- revert from there. Normally SKIPPED on pull requests (the fast gate
  # + the rotating smoke shard carry those), but runs on a PR carrying the
  # `full-ci` label -- the opt-in, pay-when-it-matters pre-merge full check for a
  # high-risk change (touching integrate/, plant/, or networks/*.yaml). It is a
  # visible signal, not a required check, so you read the result and decide.
  # Sharded across parallel runners, like the validation suite below and for the
  # same reason: even at `-n 1` (serial within a shard), a SINGLE long-lived
  # process accumulating the whole slow set -- XLA compilation cache plus live
  # JAX buffers across ~140 stiff solves -- grows without bound and the 16 GB
  # hosted runner is OOM-reclaimed mid-suite (~62 min in, SIGTERM / exit 143,
  # before the timeout; no test actually fails). The slow set crossed that
  # threshold as more whole-plant tests landed. Splitting it across N fresh
  # processes (pytest-split) keeps each process's accumulated footprint to ~1/N
  # and cuts wall time by running the shards in parallel. Every test runs in
  # exactly one shard (a complete, disjoint partition), so coverage is unchanged.
  slow:
    name: slow suite (py${{ matrix.python-version }} shard ${{ matrix.group }}/8)
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: ubuntu-latest
    # Each shard is ~1/8 of the serial run; 45 min is a safety ceiling with
    # headroom. Merge-only, so off the PR critical path. (Raised from 6 to 8
    # shards when the differentiable-plant sensitivity tests landed: more
    # whole-plant solves pushed the heaviest shard's accumulated XLA cache +
    # JAX buffers past the 16 GB runner, so a smaller 1/N slice is needed.)
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        group: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run slow suite shard
        # `slow and not validation`: a few tests carry BOTH markers (a module-
        # level `slow` plus a per-test `validation`), so excluding validation
        # here keeps the three CI groups mutually exclusive -- no test runs in two
        # jobs. (fast = "not validation and not slow"; slow = "slow and not
        # validation"; validation = "validation".)
        # `-n 1` (serial within the shard), NOT `-n auto`/`-n 2`: a single heavy
        # whole-plant test (the BSM2 family, the profile-likelihood and
        # calibration grids) peaks at ~4-5.5 GB resident, so two concurrent ones
        # OOM-kill the runner. pytest-split partitions the marked set across the 8
        # shards (by recorded duration where available in `.test_durations`, else
        # evenly by count), so this shard runs only its ~1/8 slice in a fresh
        # process -- bounding the accumulated memory.
        #
        # Exclude `heavy`: the whole-plant stable-adjoint gradient tests (the
        # dynamic_sensitivity / dynamic_dgsm tests) each compile a multi-GB plant
        # program, and a shard's worth accumulates them faster than the allocator
        # returns the freed memory to the OS, OOM-killing the runner -- the same
        # wall that excludes the heavy validation tests. They run locally
        # (`pytest -m heavy`), matching the validation suite's `not heavy`.
        run: >-
          pytest -m "slow and not validation and not heavy" -q -n 1
          --splits 8 --group ${{ matrix.group }}
          --durations=15 --timeout=900 --timeout-method=thread
          --max-worker-restart=0

  # ---- Heavy whole-plant stable-adjoint gradient tests -------------------------
  # The `heavy` set is the 7 BSM2 whole-plant stable-adjoint gradient checks, each
  # of which compiles a multi-GB whole-plant BSM2 adjoint program. They are excluded
  # from the slow / validation / smoke jobs (`... and not heavy`) and run here
  # instead, ONE PER FRESH PROCESS (the `heavy` job below, `--splits 7 -n 1`): a
  # single test fits a stock 16 GB `ubuntu-latest` runner (~2-5 GB), but several
  # accumulate (freed XLA caches are not returned to the OS) and exhaust it, so the
  # set is sharded one-test-per-process across the FREE runner. (The lighter BSM1
  # plant-AD gradient tests are NOT heavy -- they carry only `slow` / `validation`
  # and run in those free jobs.) Public-repo standard-runner minutes are free, so
  # the one-test-per-process shard across the 16 GB runner is what keeps this job
  # both free and within memory.
  #
  # WHEN IT RUNS (cost control), two triggers:
  #   * push to main -- but ONLY when adjoint/plant-relevant files changed (the
  #     `heavy-gate` path filter), and not when a `skip-heavy` label is present. A
  #     docs / examples / utils / unrelated-test merge does not run it at all.
  #   * a PR labeled `full-ci` -- the explicit pre-merge opt-in (mirrors slow /
  #     validation), so a change to the adjoint machinery is validated before merge.
  # PRs are otherwise covered by the fast gate, the pre-merge smoke, and the small
  # single-CSTR stable-adjoint smoke test in the fast gate. A `skip-heavy` label
  # still force-skips a push-to-main run for a change that touches a filtered path
  # but cannot affect the adjoint.

  # Gate that decides whether `heavy` runs: the skip-heavy label, then the path
  # filter (see the cost-control note above). Also runs on a `full-ci` PR so the
  # adjoint machinery can be validated pre-merge.
  heavy-gate:
    name: heavy gate
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # paths-filter needs history to diff the push
      - id: changes
        uses: dorny/paths-filter@v3
        with:
          # Files that can affect a whole-plant stable-adjoint gradient. Fail-SAFE:
          # when paths-filter cannot determine a base (e.g. a branch creation push)
          # it reports every path as changed, so `heavy` runs rather than silently
          # skipping. `aquakin/utils`, `transport`, docs, examples and unrelated
          # tests are intentionally NOT here -- they cannot change a plant gradient.
          filters: |
            heavy:
              - 'aquakin/plant/**'
              - 'aquakin/integrate/**'
              - 'aquakin/core/**'
              - 'aquakin/schema/**'
              - 'aquakin/networks/**'
              - 'tests/integration/test_plant_stable_adjoint.py'
              - 'tests/integration/test_dynamic_sensitivity.py'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A `full-ci` PR is an explicit pre-merge opt-in -> always run.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "full-ci PR -> running heavy for pre-merge validation."
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Push to main: a `skip-heavy` label on the merged PR wins.
          labels=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
                     --jq '.[].labels[].name' 2>/dev/null || true)
          if printf '%s\n' "$labels" | grep -qx 'skip-heavy'; then
            echo "Merged PR is labeled 'skip-heavy' -> skipping the heavy job."
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Otherwise run ONLY if adjoint/plant-relevant files changed (path filter).
          if [ "${{ steps.changes.outputs.heavy }}" = "true" ]; then
            echo "Adjoint/plant-relevant files changed -> running the heavy job."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No adjoint/plant-relevant changes -> skipping the heavy job."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  heavy:
    name: heavy stable-adjoint tests (shard ${{ matrix.group }}/7)
    needs: heavy-gate
    if: >-
      needs.heavy-gate.outputs.run == 'true'
      && (github.event_name == 'push'
          || (github.event_name == 'pull_request'
              && contains(github.event.pull_request.labels.*.name, 'full-ci')))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # ONE heavy BSM2 test per fresh process (`--splits 7`, `-n 1`). Each compiles a
    # multi-GB plant-adjoint program (~2-5 GB resident) that fits a stock 16 GB
    # `ubuntu-latest` runner ALONE, but accumulates across a process (freed XLA
    # caches are not returned to the OS, so RSS climbs test-by-test). Seven fresh
    # shards keep each process to ~one test, so the free 16 GB runner suffices
    # (public-repo Actions minutes are free). If a single test ever needs >16 GB,
    # move just this job to a larger-runner tier with >16 GB at one-per-process
    # (raising the shard count cannot shrink a single test's peak). The heavy tests
    # are not in `.test_durations`, so pytest-split partitions them evenly by count
    # (~1/shard).
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6, 7]
    # Override the top-level single-thread pin: with `-n 1` there is no xdist
    # oversubscription, so let JAX / BLAS use the runner's cores.
    env:
      OMP_NUM_THREADS: "4"
      XLA_FLAGS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run heavy tests shard
        # One BSM2 heavy test in a fresh process. The per-test timeout covers the
        # multi-GB plant-adjoint compile.
        run: >-
          pytest -m heavy -q -n 1
          --splits 7 --group ${{ matrix.group }}
          --durations=15 --timeout=1200 --timeout-method=thread

  # ---- Validation suite (against published data): merge-to-main + opt-in -------
  # Runs on push to main, and on a PR carrying the `full-ci` label (the opt-in
  # full pre-merge check; see the `slow` job above). A visible signal on the PR,
  # not a required check.
  # Sharded across parallel runners. The validation tests are the heaviest in the
  # repo (full 167-state two-network BSM2 plant steady states + ADM1 + AD through
  # stiff solves), each ~4-5.5 GB resident. They cannot run concurrently within a
  # job (`-n 2` OOM-kills the 16 GB runner), so each shard runs serially (`-n 1`),
  # but a single process accumulating ~14 of them -- XLA compilation cache plus
  # live JAX buffers -- still exhausted memory and the runner was reclaimed
  # mid-suite (~62 min in, before the timeout). Splitting the set across N fresh
  # processes (pytest-split, balanced by `.test_durations`) keeps each process's
  # accumulated footprint to ~1/N and cuts wall time by running the shards in
  # parallel. Every test runs in exactly one shard (a complete, disjoint
  # partition), so coverage is unchanged.
  validation:
    name: validation suite (shard ${{ matrix.group }}/4)
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    # Each shard is ~1/4 of the serial run (~15-25 min); 45 min is a safety
    # ceiling with headroom.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 3.12 only: the validation suite is the heaviest in the repo, so it is
          # run on a single interpreter as a deliberate cost-saving. The fast gate
          # already exercises 3.11 + 3.12, so a 3.11-specific *validation* (not
          # fast-path) regression is the accepted, narrow blind spot; widen the
          # matrix here if that ever proves to bite.
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run validation suite shard
        # `-n 1` (serial within the shard): the validation tests are the most
        # memory-heavy in the repo (~4-5.5 GB each); even two concurrent OOM-kill
        # the runner. pytest-split partitions the marked set across the 4 shards
        # by recorded duration (`.test_durations`), so this shard runs only its
        # slice in a fresh process -- bounding the accumulated memory. The
        # `heavy` validation tests (the whole-plant stable-adjoint gradients) are
        # EXCLUDED from CI entirely -- a single one of them peaks near the 16 GB
        # runner and even two in one process OOM it, with no free-runner config
        # that fits; they are run locally via `pytest -m "validation and heavy"`.
        # The stable-adjoint gradient path is still smoke-tested in the fast gate
        # by the small single-CSTR `test_stable_adjoint_plant_gradient_matches_
        # jax_adjoint_and_fd`.
        run: >-
          pytest -m "validation and not heavy" -q -n 1
          --splits 4 --group ${{ matrix.group }}
          --durations=15 --timeout=900 --timeout-method=thread --max-worker-restart=0

  # ---- Pre-merge smoke slice: a rotating shard of the slow suite, on PRs -------
  # The `slow`/`validation` suites run only on push-to-main, so a regression that
  # lives solely in them is invisible on the PR and surfaces only after merge (the
  # class behind the recent test_asm_family signature break and the slow-suite
  # OOM). The fast gate's signature-contract test catches the *signature* sub-case
  # cheaply; this job adds breadth -- it EXECUTES a bounded ~1/18 slice of the
  # slow set on every PR, so shared-fixture breaks, whole-plant call-site
  # regressions, and memory creep get an early warning before merge. It is
  # deliberately probabilistic: a single PR runs only ~8 of the ~141 slow tests,
  # but the shard ROTATES by run number, so consecutive runs cover the whole set,
  # and a fixture break (which hits most slow tests) is caught by any shard
  # immediately. Scope is `slow and not validation`: those tests have no recorded
  # durations, so pytest-split partitions them EVENLY by count (no empty shard,
  # unlike a duration-skewed slow+validation split), and it excludes the heaviest
  # ~4-min published-data validation tests, keeping the slice time predictable.
  # A bare `--collect-only` would NOT catch the kind of runtime call-site break
  # this targets, so the slice must execute. Off the fast-gate critical path
  # (runs in parallel); 20 min is a safety ceiling, not the target.
  smoke:
    name: pre-merge smoke (rotating slow shard)
    # PRs only, but not on a bare `labeled` event (it already ran on the latest
    # commit; a `full-ci` label instead triggers the full slow+validation jobs).
    if: github.event_name == 'pull_request' && github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run a rotating slow-suite shard
        # Pick the shard from the run number so consecutive runs rotate through
        # all 18 groups (GitHub expression syntax has no modulo, so compute it in
        # the shell). 1-indexed for pytest-split (--group is 1..N).
        run: |
          group=$(( ${{ github.run_number }} % 18 + 1 ))
          echo "Pre-merge smoke: slow shard ${group}/18 (rotates by run number)"
          set +e
          pytest -m "slow and not validation and not heavy" -q -n 1 \
            --splits 18 --group "${group}" \
            --durations=15 --timeout=900 --timeout-method=thread --max-worker-restart=0
          ec=$?
          # Exit code 5 = pytest collected no tests. The duration-based-chunks
          # split front-loads the groups, so a trailing group (e.g. 18/18) can be
          # empty; the rotating sampler then lands on it. That is benign for a
          # smoke check -- consecutive runs rotate to non-empty groups -- so treat
          # "no tests collected" as a pass. Any real test failure still fails.
          if [ "$ec" -eq 5 ]; then
            echo "Empty rotating shard (no tests in group ${group}); treating as pass."
            exit 0
          fi
          exit $ec

  # ---- Weekly refresh of .test_durations (schedule only) ----------------------
  # The slow (6) and validation (4) jobs pytest-split-shard by `.test_durations`;
  # as tests are added the file drifts (a test with no recorded duration gets the
  # fallback average), so the shards lose their duration balance. This weekly job
  # re-records every slow/validation test's duration and commits the result back.
  #
  # It runs `slow or validation` ACROSS SHARDS with `--store-durations` (each
  # shard records its own slice -- recording the whole set in one process would
  # OOM the runner, the same reason the suites are sharded in the first place),
  # uploads the per-shard files, and the commit job merges them into a complete
  # `.test_durations`. A complete, disjoint partition, so every test is recorded
  # exactly once and stale entries (tests no longer slow/validation) are pruned.
  refresh-durations:
    name: refresh test-durations (shard ${{ matrix.group }}/8)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Generous ceiling: the refresh split is balanced by the (drifted) current
    # durations, so a shard can be heavier than the steady-state shards.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Record this shard's durations
        # Exclude `heavy`: those whole-plant stable-adjoint tests do not run in
        # CI (they OOM the 16 GB runner), so they need no recorded durations, and
        # timing them here would OOM this job too.
        run: >-
          pytest -m "(slow or validation) and not heavy" -q -n 1
          --splits 8 --group ${{ matrix.group }}
          --store-durations --durations-path durations-${{ matrix.group }}.json
          --timeout=900 --timeout-method=thread --max-worker-restart=0

      - name: Upload shard durations
        uses: actions/upload-artifact@v4
        with:
          name: durations-${{ matrix.group }}
          path: durations-${{ matrix.group }}.json
          if-no-files-found: error

  commit-durations:
    name: open .test_durations refresh PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: refresh-durations          # only proceed on a COMPLETE set (all shards ok)
    runs-on: ubuntu-latest
    permissions:
      contents: write                 # write .test_durations via the Contents API
      pull-requests: write            # open the PR
    steps:
      - uses: actions/checkout@v4

      - name: Download all shard durations
        uses: actions/download-artifact@v4
        with:
          pattern: durations-*
          path: _durations
          merge-multiple: true

      - name: Merge into .test_durations
        run: |
          python - <<'PY'
          import glob, json
          combined = {}
          for f in sorted(glob.glob("_durations/durations-*.json")):
              combined.update(json.load(open(f)))
          if not combined:
              raise SystemExit("no shard durations found -- aborting")
          # Match the existing format exactly (sorted keys, indent=4, no trailing
          # newline) so an unchanged set is a no-op diff.
          with open(".test_durations", "w") as fh:
              json.dump(dict(sorted(combined.items())), fh, indent=4)
          print(f"merged {len(combined)} test durations")
          PY

      - name: Open / update the refresh PR if changed
        # `main` is branch-protected, so this does NOT push to it: it puts the
        # change on a single rolling `ci/refresh-test-durations` branch and opens
        # one PR you merge. Two GITHUB_TOKEN limitations shape HOW:
        #   1. The token may not push a *branch* whose tree carries the repo's
        #      workflow files (a new branch "introduces" .github/workflows/* and
        #      the token lacks the un-grantable `workflows` permission). So the
        #      commit is made through the GitHub Contents API, which writes ONLY
        #      .test_durations and never pushes workflow content -- no PAT needed.
        #   2. Opening a PR from the token needs the repo setting "Allow GitHub
        #      Actions to create and approve pull requests" (Settings -> Actions
        #      -> General). If it is off, `gh pr create` fails -- so that failure
        #      is non-fatal: the branch is still updated and you open the PR once
        #      by hand (or enable the setting and it auto-opens thereafter).
        # CI does not run on a bot-authored PR, so merge it with your admin bypass
        # (it touches only .test_durations).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- .test_durations; then
            echo "No change to .test_durations -- nothing to do."
            exit 0
          fi
          repo="$GITHUB_REPOSITORY"
          branch="ci/refresh-test-durations"
          base_sha="$(git rev-parse HEAD)"   # the checked-out main commit

          # Point the rolling branch at the current main (create, or reset if it
          # already exists) so the PR diff is exactly this run's durations change.
          if gh api "repos/$repo/git/refs/heads/$branch" >/dev/null 2>&1; then
            gh api -X PATCH "repos/$repo/git/refs/heads/$branch" \
              -f sha="$base_sha" -F force=true >/dev/null
          else
            gh api -X POST "repos/$repo/git/refs" \
              -f ref="refs/heads/$branch" -f sha="$base_sha" >/dev/null
          fi

          # Commit ONLY .test_durations onto the branch via the Contents API.
          file_sha="$(gh api "repos/$repo/contents/.test_durations?ref=$branch" --jq .sha)"
          gh api -X PUT "repos/$repo/contents/.test_durations" \
            -f message="ci: refresh .test_durations" \
            -f content="$(base64 -w0 .test_durations)" \
            -f branch="$branch" \
            -f sha="$file_sha" >/dev/null
          echo "Updated $branch with the refreshed durations."

          # Open the PR if one isn't already open. Non-fatal if the repo setting
          # blocks Actions from creating PRs (see note above).
          if [ -n "$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')" ]; then
            echo "Refresh PR already open; its branch was updated in place."
          elif gh pr create --base main --head "$branch" \
              --title "ci: refresh .test_durations" \
              --body "Automated refresh of the pytest-split durations that balance the slow/validation shards. **Metadata-only** (only \`.test_durations\` changes), so it is safe to merge. Opened by the \`refresh-durations\` job via the GitHub API; CI does not run on bot-authored PRs, so merge with your admin override."; then
            echo "Opened the refresh PR."
          else
            echo "::warning::Branch '$branch' was updated but the PR could not be "\
              "opened automatically. Enable 'Allow GitHub Actions to create and "\
              "approve pull requests' (Settings -> Actions -> General), or open a "\
              "PR from '$branch' by hand once -- later runs reuse it."
          fi
