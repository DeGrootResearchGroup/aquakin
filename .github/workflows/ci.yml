name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pin XLA/BLAS to a single thread per process so pytest-xdist workers do not
# oversubscribe the runner's CPUs (each JAX process otherwise grabs every core,
# and N workers x M cores thrashes). With this, -n auto scales cleanly.
env:
  OMP_NUM_THREADS: "1"
  XLA_FLAGS: "--xla_cpu_multi_thread_eigen=false"

jobs:
  # ---- Fast merge gate: unit + fast integration -------------------------------
  # Runs on every pull request AND every push to main. Excludes the multi-minute
  # stiff/plant solves (marked `slow`) and the published-data `validation` suite,
  # which run in full on merge to main (see the `slow` and `validation` jobs).
  # This is the required status check that gates merging.
  test:
    name: fast tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # The fast gate is ~8 min on a 5-core dev machine but ~15-25 min on the
    # 4-vCPU hosted runner (the integration tests are real stiff-ODE solves whose
    # cost is spread across hundreds of tests and does not parallelise away on few
    # cores) -- still well under the old full "not validation" job (~32 min on
    # 3.12) since the `slow` files and validation are now deferred to merge. 30
    # min is a safety ceiling with headroom; a run approaching it signals a real
    # regression, not normal drift.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Python 3.10 is install-compatible (requires-python >= 3.10) but excluded
        # from CI: its heavier jaxlib build ran close to the hosted runner's
        # resource/time limits and was intermittently killed, while 3.11/3.12
        # stayed green and the suite passed locally on 3.10.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run fast tests (unit + fast integration)
        # --timeout fires inside a worker if a single test deadlocks, naming the
        # offending test instead of hanging silently. --max-worker-restart=0 makes
        # a crashed worker fail the run immediately. Together with timeout-minutes
        # above, a hang surfaces a clear, fast failure.
        # --dist loadscope keeps a module's tests on one worker, so a module-
        # scoped fixture (e.g. a built+solved BSM2 plant) compiles ONCE per module
        # instead of once per worker that draws one of its tests -- compiling a
        # stiff solve dominates the cost. (Trade-off: coarser load balancing, a
        # heavy module can't be split across workers.)
        run: >-
          pytest -m "not validation and not slow" -q -n auto --dist loadscope
          --durations=15 --timeout=600 --timeout-method=thread
          --max-worker-restart=0

  # ---- Full slow integration suite: merge-to-main only ------------------------
  # The multi-minute stiff/plant solves. Skipped on pull requests (the fast gate
  # carries those); runs on every push to main so a regression the PR's fast gate
  # could not catch surfaces within minutes of landing -- revert from there.
  slow:
    name: slow suite (py${{ matrix.python-version }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run slow suite
        # --dist loadscope: module-scoped fixtures compile once per module (see
        # the fast-tests step).
        run: >-
          pytest -m "slow" -q -n auto --dist loadscope --durations=15
          --timeout=900 --timeout-method=thread --max-worker-restart=0

  # ---- Validation suite (against published data): merge-to-main only ----------
  validation:
    name: validation suite
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Merge-to-main only (not on the PR critical path), so a generous ceiling is
    # fine. The validation set has grown (now ~24 tests: published-data checks
    # plus the AD-correctness suites -- discrete/stable/forward adjoints). These
    # are the heaviest tests in the repo (full 167-state two-network BSM2 plant
    # steady states + ADM1 + AD through stiff solves), so unlike the `slow` suite
    # they OOM the 16 GB hosted runner under `-n auto` (4 workers): four heavy
    # solves' peak memory coincides and the runner is killed mid-run. Capping at
    # `-n 2` halves the concurrent heavy solves (so ~half the peak memory) at the
    # cost of wall time -- acceptable here, since validation is off the PR
    # critical path. 60 min absorbs the slower run with headroom.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run validation suite (against published data)
        # `-n 2` (not `-n auto`): the validation tests are the most memory-heavy
        # in the repo, and four concurrent on the 16 GB runner OOM-kill it. Two
        # at a time keeps peak memory in budget.
        run: >-
          pytest -m validation -q -n 2 --durations=15
          --timeout=900 --timeout-method=thread --max-worker-restart=0
