name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Pin XLA/BLAS to a single thread per process so pytest-xdist workers do not
    # oversubscribe the CI runner's CPUs (each JAX process otherwise grabs every
    # core, and N workers x M cores thrashes). With this, -n auto scales cleanly.
    env:
      OMP_NUM_THREADS: "1"
      XLA_FLAGS: "--xla_cpu_multi_thread_eigen=false"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit and integration tests
        run: pytest -m "not validation" -q -n auto --durations=15

  validation:
    name: validation suite
    runs-on: ubuntu-latest
    env:
      OMP_NUM_THREADS: "1"
      XLA_FLAGS: "--xla_cpu_multi_thread_eigen=false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run validation suite (against published data)
        run: pytest -m validation -q -n auto --durations=15
