name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pin XLA/BLAS to a single thread per process so pytest-xdist workers do not
# oversubscribe the runner's CPUs (each JAX process otherwise grabs every core,
# and N workers x M cores thrashes). With this, -n auto scales cleanly.
env:
  OMP_NUM_THREADS: "1"
  XLA_FLAGS: "--xla_cpu_multi_thread_eigen=false"

jobs:
  # ---- Fast merge gate: unit + fast integration -------------------------------
  # Runs on every pull request AND every push to main. Excludes the multi-minute
  # stiff/plant solves (marked `slow`) and the published-data `validation` suite,
  # which run in full on merge to main (see the `slow` and `validation` jobs).
  # This is the required status check that gates merging.
  test:
    name: fast tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # The fast gate is ~8 min on a 5-core dev machine but ~15-25 min on the
    # 4-vCPU hosted runner (the integration tests are real stiff-ODE solves whose
    # cost is spread across hundreds of tests and does not parallelise away on few
    # cores) -- still well under the old full "not validation" job (~32 min on
    # 3.12) since the `slow` files and validation are now deferred to merge. 30
    # min is a safety ceiling with headroom; a run approaching it signals a real
    # regression, not normal drift.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Python 3.10 is install-compatible (requires-python >= 3.10) but excluded
        # from CI: its heavier jaxlib build ran close to the hosted runner's
        # resource/time limits and was intermittently killed, while 3.11/3.12
        # stayed green and the suite passed locally on 3.10.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run fast tests (unit + fast integration)
        # --timeout fires inside a worker if a single test deadlocks, naming the
        # offending test instead of hanging silently. --max-worker-restart=0 makes
        # a crashed worker fail the run immediately. Together with timeout-minutes
        # above, a hang surfaces a clear, fast failure.
        # Default `-n auto` (load) distribution spreads tests across workers for
        # the best balance. (`--dist loadscope` was tried to let module-scoped
        # plant fixtures compile once per module, but once the heavy shared-fixture
        # tests moved to the merge-only `slow` job it only serialized the
        # remaining independent parametrized heavy tests onto single workers --
        # measured ~1.4x slower here, ~4x slower on the slow suite.)
        run: >-
          pytest -m "not validation and not slow" -q -n auto
          --durations=15 --timeout=600 --timeout-method=thread
          --max-worker-restart=0

  # ---- Full slow integration suite: merge-to-main only ------------------------
  # The multi-minute stiff/plant solves. Skipped on pull requests (the fast gate
  # carries those); runs on every push to main so a regression the PR's fast gate
  # could not catch surfaces within minutes of landing -- revert from there.
  slow:
    name: slow suite (py${{ matrix.python-version }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # `-n 1` (serial, see the run step) roughly doubles wall time versus `-n 2`,
    # so the ceiling is raised to 100 min with headroom for further growth.
    # Merge-only, so off the PR critical path.
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run slow suite
        # `slow and not validation`: a few tests carry BOTH markers (a module-
        # level `slow` plus a per-test `validation`), so excluding validation
        # here keeps the three CI groups mutually exclusive -- no test runs in two
        # jobs. (fast = "not validation and not slow"; slow = "slow and not
        # validation"; validation = "validation".)
        # `-n 1` (serial), NOT `-n auto`/`-n 2`: a single heavy whole-plant test
        # (the BSM2 family, the profile-likelihood and calibration grids) peaks at
        # ~4-5.5 GB resident, and the heaviest do several solves and spike higher.
        # On the 16 GB hosted runner two concurrent ones (`-n 2`) reach 10-16 GB
        # and the runner is OOM-killed or thrashes to the timeout when two heavy
        # tests coincide (observed intermittently: one Python version passes while
        # the other OOMs). Running serially caps peak at ~one test (~7-9 GB with
        # the interpreter), comfortably in budget, at the cost of wall time --
        # acceptable since this is merge-only, off the PR critical path.
        run: >-
          pytest -m "slow and not validation" -q -n 1
          --durations=15 --timeout=900 --timeout-method=thread
          --max-worker-restart=0

  # ---- Validation suite (against published data): merge-to-main only ----------
  # Sharded across parallel runners. The validation tests are the heaviest in the
  # repo (full 167-state two-network BSM2 plant steady states + ADM1 + AD through
  # stiff solves), each ~4-5.5 GB resident. They cannot run concurrently within a
  # job (`-n 2` OOM-kills the 16 GB runner), so each shard runs serially (`-n 1`),
  # but a single process accumulating ~14 of them -- XLA compilation cache plus
  # live JAX buffers -- still exhausted memory and the runner was reclaimed
  # mid-suite (~62 min in, before the timeout). Splitting the set across N fresh
  # processes (pytest-split, balanced by `.test_durations`) keeps each process's
  # accumulated footprint to ~1/N and cuts wall time by running the shards in
  # parallel. Every test runs in exactly one shard (a complete, disjoint
  # partition), so coverage is unchanged.
  validation:
    name: validation suite (shard ${{ matrix.group }}/4)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    # Each shard is ~1/4 of the serial run (~15-25 min); 45 min is a safety
    # ceiling with headroom.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run validation suite shard
        # `-n 1` (serial within the shard): the validation tests are the most
        # memory-heavy in the repo (~4-5.5 GB each); even two concurrent OOM-kill
        # the runner. pytest-split partitions the marked set across the 4 shards
        # by recorded duration (`.test_durations`), so this shard runs only its
        # slice in a fresh process -- bounding the accumulated memory.
        run: >-
          pytest -m validation -q -n 1
          --splits 4 --group ${{ matrix.group }}
          --durations=15 --timeout=900 --timeout-method=thread --max-worker-restart=0
