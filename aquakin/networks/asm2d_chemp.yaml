network:
  name: asm2d_chemp
  extends: asm2d
  version: "1.0"
  description: >
    ASM2d with saturation-index-driven chemical phosphorus removal by ferric
    dosing, replacing ASM2d's simple empirical metal-hydroxide precipitation
    (the `kPRE*[SPO4]*[XMeOH]` Precipitation/Redissolution pair) with the
    generalised precipitation framework (Kazadi Mbamba et al. 2015). Dosed
    ferric (S_Fe3) precipitates orthophosphate as the very insoluble strengite
    FePO4 and competes to form ferrihydrite Fe(OH)3; the precipitation rate is
    driven by the aqueous saturation index computed from the free-ion activities
    at the operating pH, so the achievable effluent phosphate has a pH-dependent
    floor (chemical-P worsens at higher pH, where the hydroxide buffers the free
    metal) -- the thermodynamics the empirical kPRE law cannot represent.

    The minerals use the bounded supersaturation driver
    (`R = tanh(SI/(2*nu)*ln10)`), so the rate Jacobian is ~k (non-stiff) and a
    dynamic reactor / plant solve is differentiable -- `jax.grad` of the effluent
    phosphate w.r.t. the ferric dose flows through the time integration. pH is a
    fixed operating condition (a `speciation:` charge-balance pH could supply it
    instead). The metal and the solids are tracked in mol/m3; the biological
    phosphate SPO4 stays in ASM2d's g_P/m3, so the precipitation reactions carry
    the P molar mass (`P_MW`) to convert between the two.
  references:
    - "Henze, M. et al. (2000). Activated Sludge Models ASM1, ASM2, ASM2d and ASM3. IWA STR No. 9."
    - "Kazadi Mbamba, C., Batstone, D.J., Flores-Alsina, X. & Tait, S. (2015). A generalised chemical precipitation modelling approach in wastewater treatment applied to calcite. Water Research 68, 342-353."
    - "Flores-Alsina, X. et al. (2016). Modelling phosphorus (P), sulfur (S) and iron (Fe) interactions. Water Research 95, 370-382."

# Drop ASM2d's simple metal-hydroxide precipitation model; the saturation-driven
# engine below replaces it.
remove:
  reactions: [Precipitation, Redissolution]
  parameters: [kPRE, kRED, fMeOH_PO4_MW, fMeP_PO4_MW, KALK_PRE]
  expressions: [Monod_SALK_PRE]
  species: [XMeOH, XMeP]

species:
  - {name: S_Fe3, default_concentration: 0.0, units: "mol/m3", description: "Total ferric iron (Fe3+), dosed"}
  - {name: X_FePO4, default_concentration: 1.0e-6, units: "mol/m3", description: "Strengite FePO4 solid; small seed enables nucleation"}
  - {name: X_FeOH3, default_concentration: 1.0e-6, units: "mol/m3", description: "Ferrihydrite Fe(OH)3 solid; small seed enables nucleation"}

conditions:
  - {name: pH, default: 7.0, description: "Operating pH (fixed)."}

precipitation:
  pH_field: pH
  temperature_field: T
  temperature_units: kelvin
  activity_model: davies
  ionic_strength_offset: 0.02
  minerals:
    - name: FePO4
      pKsp: 26.4
      supersaturation_form: bounded
      ions:
        - {species: S_Fe3, molar_mass: 1000, count: 1, charge: 3}
        # SPO4 is ASM2d's total inorganic P in g_P/m3; molar_mass 31000 converts
        # g_P/m3 -> mol/L for the ion-activity product, and `phosphate` takes the
        # PO4^3- free-ion fraction at the operating pH.
        - {species: SPO4, molar_mass: 31000, count: 1, charge: 3, fraction: phosphate}
    - name: FeOH3
      pKsp: 38.8
      supersaturation_form: bounded
      ions:
        - {species: S_Fe3, molar_mass: 1000, count: 1, charge: 3}
        - {count: 3, charge: 1, fraction: hydroxide}

parameters:
  # Crystallisation rates (1/d). With the bounded driver the rate is ~k_cryst*X
  # near the dose, so make these large enough to reach equilibrium within the span.
  k_FePO4: {value: 300.0, units: "1/d", bounds: [1.0, 1.0e4], transform: positive_log}
  k_FeOH3: {value: 50.0, units: "1/d", bounds: [1.0, 1.0e4], transform: positive_log}
  # Phosphorus molar mass: bridges the mol/m3 precipitation to ASM2d's g_P/m3 SPO4
  # (1 mol FePO4 consumes 1 mol P = P_MW g of SPO4).
  P_MW: {value: 31.0, units: "g_P/mol", bounds: [31.0, 31.0], transform: none}

reactions:
  - name: FePO4_precipitation
    description: "Fe3+ + PO4^3- -> FePO4 (saturation-index bounded-driver kinetics)."
    rate: "k_FePO4 * [X_FePO4] * {R_FePO4}"
    stoichiometry:
      S_Fe3: -1.0
      SPO4: "(-1) * P_MW"
      X_FePO4: 1.0

  - name: FeOH3_precipitation
    description: "Fe3+ + 3 OH- -> Fe(OH)3 (saturation-index bounded-driver kinetics)."
    rate: "k_FeOH3 * [X_FeOH3] * {R_FeOH3}"
    stoichiometry:
      S_Fe3: -1.0
      X_FeOH3: 1.0
