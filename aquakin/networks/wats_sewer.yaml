  rate: "q_ferm * [S_B] / ([S_B] + k_fe) * monod_inh([S_O], k_o) * monod_inh([S_NO], k_no) * eps * {X_BF} * theta_w * {A_V}"
  stoichiometry: {S_B: -1, S_VFA: 1.0, S_SO4: "i_s_sb", S_CO2: 0.125}
- name: sulfide_chemoxidation_bulk
  description: "Aerobic chemical sulfide oxidation, bulk (WATS Eqs 5.13-5.14: power-law in sulfide/DO, rate const a pH-weighted H2S/HS- average; temperature coefficient 1.07 via theta_w)."
  rate: "(k_h2sc * pH_switch(pKa) + k_hsc * (1.0 - pH_switch(pKa))) * ho_sumS_n1 * ho_SO_n2 * theta_w"
  parameters:
    pKa: {value: 7.1, units: "-"}     # H2S/HS- pKa weighting the chemical-oxidation rate
  stoichiometry: {sumS: -1, S_SO4: 1, S_O: -2.0}
- name: sulfide_biooxidation_bulk
  description: "Aerobic biological sulfide oxidation, bulk (WATS Eqs 5.13-5.15: power-law in sulfide/DO, bell-shaped pH dependence f_sII_pH about pH_optimum; temperature coefficient 1.10 via theta_sob)."
  rate: "k_sII_b_pHopt * f_sII_pH * ho_sumS_n1 * ho_SO_n2 * theta_sob"
  stoichiometry: {sumS: -1, S_SO4: 1, S_O: -2.0}
- name: sulfate_reduction_biofilm
  description: 'Sulfide formation by sulfate-reducing bacteria, biofilm (WATS Eq 6.24): half-order in readily available substrate (SF+SA+XS1), O2- and nitrate-inhibited, areal.'
  rate: a_h2s * ho_srbsub_half * monod_inh([S_O], k_o) * monod_inh([S_NO], k_no) * theta_s * {A_V}
  stoichiometry:
    S_B: -2
    sumS: 1
    S_SO4: -1
- name: sulfide_oxidation_biofilm
  description: 'Biological sulfide oxidation in the biofilm (WATS Eq 5.16): half-order in
    sulfide and oxygen, areal, with the bell-shaped pH dependence f_sII_pH (Eq 5.15, same
    pHopt/omega as the bulk water phase, Sec. 5.5.2) and temperature coefficient 1.03 (a_s).
    Written net to sulfate as in the WATS process matrix (Table 9.4); mechanistically
    elemental sulfur is the main intermediate, captured explicitly by the elemental-sulfur
    cycle of the extended/Khalil models.'
  rate: k_sox_f * ho_sumS_half * ho_SO_half * f_sII_pH * theta_s * {A_V}
  stoichiometry:
    sumS: -1
    S_SO4: 1
    S_O: -2
