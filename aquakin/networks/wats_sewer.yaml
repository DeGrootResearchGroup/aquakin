  description: "Fermentation of S_B to VFA, bulk water (WATS Table 9.3: S_F -> S_A)."
  rate: "q_ferm * [S_B] / ([S_B] + k_fe) * monod_inh([S_O], k_o) * monod_inh([S_NO], k_no) * [X_BH] * theta_w"
  stoichiometry: {S_B: -1, S_VFA: 1.0, S_SO4: "i_s_sb", S_CO2: 0.125}
