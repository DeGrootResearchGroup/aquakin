network:
  name: asm3_2step
  version: "1.0"
  description: >
    ASM3 extended for TWO-STEP nitrification and TWO-STEP denitrification, after
    Kaelin et al. (2009). Nitrite (NO2) is carried as an explicit intermediate of
    both autotrophic and heterotrophic nitrogen turnover, so nitrite dynamics
    (peaks under aeration/temperature shocks, nitrite-shunt operation) are
    resolved instead of lumped into a single NOx pool.

    Relative to the base ASM3 (13 compounds, 8 processes) two state variables are
    split: the lumped nitrate+nitrite SNOX becomes SNO3 + SNO2, and the single
    autotroph XA becomes ammonia-oxidising XAOB (NH4 -> NO2, nitritation) and
    nitrite-oxidising XNOB (NO2 -> NO3, nitratation). The eight ASM3 processes
    become twenty: every autotroph process is doubled (AOB / NOB), and every
    heterotrophic anoxic process (storage, growth, endogenous respiration of XH
    and of XSTO) is split into a first step on nitrate (NO3 -> NO2) and a second
    on nitrite (NO2 -> N2).

    The two denitrification steps share the electron budget of full
    denitrification: NO3 -> NO2 is a 2-electron reduction (COD/N factor
    iCOD_NO3NO2 = 8/7 = 1.143 gCOD/gN) and NO2 -> N2 is a 3-electron reduction
    (iCOD_NO2N2 = 12/7 = 1.714 gCOD/gN); the two sum to the 5-electron full
    factor iNO3_N2 = 40/14 = 2.857 used for the autotroph anoxic endogenous
    respiration (where nitrite as an intermediate is negligible). Nitritation
    consumes iO2_AOB = 48/14 gO2/gN (6-electron NH4 -> NO2) and nitratation
    iO2_NOB = 16/14 gO2/gN (2-electron NO2 -> NO3); the two sum to the full
    64/14 nitrification oxygen demand.

    Stoichiometric coefficients are SYMBOLIC EXPRESSIONS in the yield, composition
    and electron-equivalent parameters, so calibrating a yield propagates to every
    dependent coefficient. Alkalinity follows the charge balance of the ionic N
    species (SNH4 carries +1/14 eq/gN, SNO2 and SNO3 each -1/14): the NO3 -> NO2
    step is a charge-neutral anion swap (no alkalinity change), while NO2 -> N2
    removes an anion and raises alkalinity.

    Default parameters are the Kaelin et al. (2009) values at 20 deg C (Tables 2
    and 7), with the rate temperature dependencies from Table 5 expressed as
    ``theta^(T - 293.15)`` (theta = exp of the paper's exponential coefficient).
    Aeration (kLa) is supplied by the reactor, not as a network process.
  references:
    - "Kaelin, D., Manser, R., Rieger, L., Eugster, J., Rottermann, K. & Siegrist, H. (2009). Extension of ASM3 for two-step nitrification and denitrification and its calibration and validation with batch tests and pilot scale data. Water Research 43(6), 1680-1692."
    - "Gujer, W., Henze, M., Mino, T. & van Loosdrecht, M. (1999). Activated Sludge Model No. 3. Water Sci. Technol. 39(1), 183-193."

species:
  - {name: SO2,  default_concentration: 2.0,  units: "g_O2/m3",  description: "Dissolved oxygen (O2)"}
  - {name: SS,   default_concentration: 20.0, units: "g_COD/m3", description: "Soluble biodegradable organics"}
  - {name: SNH4, default_concentration: 5.0,  units: "g_N/m3",   description: "Ammonia (NH4+ + NH3)"}
  - {name: SNO2, default_concentration: 0.1,  units: "g_N/m3",   description: "Nitrite nitrogen (NO2-N)"}
  - {name: SNO3, default_concentration: 5.0,  units: "g_N/m3",   description: "Nitrate nitrogen (NO3-N)"}
  - {name: SN2,  default_concentration: 0.0,  units: "g_N/m3",   description: "Dissolved nitrogen (N2)"}
  - {name: SALK, default_concentration: 0.005, units: "kmol/m3", description: "Alkalinity (HCO3-)"}
  - {name: SI,   default_concentration: 30.0, units: "g_COD/m3", description: "Soluble undegradable organics"}
  - {name: XI,   default_concentration: 25.0, units: "g_COD/m3", description: "Particulate unbiodegradable organics"}
  - {name: XS,   default_concentration: 100.0, units: "g_COD/m3", description: "Particulate biodegradable organics"}
  - {name: XH,   default_concentration: 1000.0, units: "g_COD/m3", description: "Ordinary heterotrophic organisms (OHO)"}
  - {name: XSTO, default_concentration: 10.0, units: "g_COD/m3", description: "Storage compound in OHOs"}
  - {name: XAOB, default_concentration: 50.0, units: "g_COD/m3", description: "Ammonia-oxidising bacteria (NH4 -> NO2)"}
  - {name: XNOB, default_concentration: 50.0, units: "g_COD/m3", description: "Nitrite-oxidising bacteria (NO2 -> NO3)"}
  - {name: XSS,  default_concentration: 1000.0, units: "g_TSS/m3", description: "Total suspended solids (TSS)"}

conditions:
  - {name: T, default: 293.15, description: "Temperature (K). Rate constants are at the 293.15 K (20 deg C) reference."}

# Protect the Monod / ratio rate terms from a transiently-negative state (a
# coupled plant settler can briefly drive a particulate below zero); identity at
# feasible states. Matches the reference IWA/BSM xtemp = max(x, 0) convention.
clip_negative_states: true

parameters:
  # --- Kinetic rate constants (1/d), at 20 deg C, with Arrhenius temperature
  # corrections theta^(T - ref_T). theta = exp(paper's exponential slope), e.g.
  # AOB exp(0.120) = 1.1275; ref_T = 293.15 K so the correction is unity at 20 C.
  kH:     {value: 9.0,  units: "1/d", bounds: [0.5, 50.0],  transform: positive_log, temperature: {theta: 1.040811, ref_T: 293.15}}
  kSTO:   {value: 12.0, units: "1/d", bounds: [0.5, 60.0],  transform: positive_log, temperature: {theta: 1.072508, ref_T: 293.15}}
  muH:    {value: 3.0,  units: "1/d", bounds: [0.2, 20.0],  transform: positive_log, temperature: {theta: 1.072508, ref_T: 293.15}}
  muAOB:  {value: 0.9,  units: "1/d", bounds: [0.1, 3.0],   transform: positive_log, temperature: {theta: 1.127497, ref_T: 293.15}}
  muNOB:  {value: 0.65, units: "1/d", bounds: [0.1, 3.0],   transform: positive_log, temperature: {theta: 1.081123, ref_T: 293.15}}
  bHO2:   {value: 0.3,  units: "1/d", bounds: [0.02, 2.0],  transform: positive_log}
  bSTOO2: {value: 0.3,  units: "1/d", bounds: [0.02, 2.0],  transform: positive_log}
  bAOB:   {value: 0.15, units: "1/d", bounds: [0.01, 1.0],  transform: positive_log, temperature: {theta: 1.127497, ref_T: 293.15}}
  bNOB:   {value: 0.22, units: "1/d", bounds: [0.01, 1.0],  transform: positive_log, temperature: {theta: 1.081123, ref_T: 293.15}}
  # --- Anoxic reduction factors (-) for the two denitrification steps ---
  etaH_NO3:     {value: 0.15, units: "-", bounds: [0.01, 1.0], transform: logit}
  etaH_NO2:     {value: 0.25, units: "-", bounds: [0.01, 1.0], transform: logit}
  etaH_end_NO3: {value: 0.25, units: "-", bounds: [0.01, 1.0], transform: logit}
  etaH_end_NO2: {value: 0.70, units: "-", bounds: [0.01, 1.0], transform: logit}
  etaN_end:     {value: 0.10, units: "-", bounds: [0.01, 1.0], transform: logit}
  # --- Saturation / inhibition constants ---
  KX:      {value: 1.0,  units: "g_COD/g_COD", bounds: [0.01, 10.0],  transform: positive_log}
  KHSTO:   {value: 0.1,  units: "g_COD/g_COD", bounds: [0.01, 10.0],  transform: positive_log}
  KHO2:    {value: 0.2,  units: "g_O2/m3",     bounds: [0.01, 2.0],   transform: positive_log}
  KHO2inh: {value: 0.2,  units: "g_O2/m3",     bounds: [0.01, 2.0],   transform: positive_log}
  KHSS:    {value: 10.0, units: "g_COD/m3",    bounds: [1.0, 100.0],  transform: positive_log}
  KHNH4:   {value: 0.01, units: "g_N/m3",      bounds: [0.001, 1.0],  transform: positive_log}
  KHALK:   {value: 0.0001, units: "kmol/m3",   bounds: [1.0e-6, 0.01], transform: positive_log}
  KHNO3:   {value: 0.5,  units: "g_N/m3",      bounds: [0.05, 5.0],   transform: positive_log}
  KHNO2:   {value: 0.5,  units: "g_N/m3",      bounds: [0.05, 5.0],   transform: positive_log}
  KAOBO2:  {value: 0.8,  units: "g_O2/m3",     bounds: [0.05, 8.0],   transform: positive_log}
  KAOBNH4: {value: 0.14, units: "g_N/m3",      bounds: [0.01, 2.0],   transform: positive_log}
  KNOBO2:  {value: 0.8,  units: "g_O2/m3",     bounds: [0.05, 8.0],   transform: positive_log}
  KNOBNO2: {value: 0.28, units: "g_N/m3",      bounds: [0.02, 3.0],   transform: positive_log}
  KNALK:   {value: 0.0005, units: "kmol/m3",   bounds: [5.0e-6, 0.05], transform: positive_log}
  # --- Yields (g COD biomass or storage per g substrate / g N) ---
  YHO2:    {value: 0.80, units: "g_COD/g_COD", bounds: [0.4, 0.95],  transform: logit}
  YHNO3:   {value: 0.65, units: "g_COD/g_COD", bounds: [0.3, 0.9],   transform: logit}
  YHNO2:   {value: 0.65, units: "g_COD/g_COD", bounds: [0.3, 0.9],   transform: logit}
  YSTOO2:  {value: 0.80, units: "g_COD/g_COD", bounds: [0.4, 0.95],  transform: logit}
  YSTONO3: {value: 0.70, units: "g_COD/g_COD", bounds: [0.3, 0.95],  transform: logit}
  YSTONO2: {value: 0.70, units: "g_COD/g_COD", bounds: [0.3, 0.95],  transform: logit}
  YAOB:    {value: 0.18, units: "g_COD/g_N",   bounds: [0.05, 0.5],  transform: logit}
  YNOB:    {value: 0.06, units: "g_COD/g_N",   bounds: [0.02, 0.3],  transform: logit}
  # --- Composition (N content; TSS-to-COD ratios) ---
  iN_SI:  {value: 0.01, units: "g_N/g_COD", bounds: [0.001, 0.1], transform: positive_log}
  iN_SS:  {value: 0.03, units: "g_N/g_COD", bounds: [0.001, 0.2], transform: positive_log}
  iN_XI:  {value: 0.04, units: "g_N/g_COD", bounds: [0.001, 0.2], transform: positive_log}
  iN_XS:  {value: 0.03, units: "g_N/g_COD", bounds: [0.001, 0.2], transform: positive_log}
  iN_BM:  {value: 0.07, units: "g_N/g_COD", bounds: [0.01, 0.2],  transform: positive_log}
  iSS_XI:  {value: 0.75, units: "g_TSS/g_COD", bounds: [0.1, 2.0], transform: positive_log}
  iSS_XS:  {value: 0.75, units: "g_TSS/g_COD", bounds: [0.1, 2.0], transform: positive_log}
  iSS_STO: {value: 0.60, units: "g_TSS/g_COD", bounds: [0.1, 2.0], transform: positive_log}
  iSS_BM:  {value: 0.90, units: "g_TSS/g_COD", bounds: [0.1, 2.0], transform: positive_log}
  fSI: {value: 0.0, units: "g_COD/g_COD", bounds: [0.0, 1.0e-9], transform: none}
  fXI: {value: 0.2, units: "g_COD/g_COD", bounds: [0.02, 0.5],   transform: logit}
  # --- Electron-equivalent and charge constants (fixed physics, not calibrated).
  # iCOD_NO3NO2 = 8/7 (2 e- NO3->NO2), iCOD_NO2N2 = 12/7 (3 e- NO2->N2),
  # iNO3_N2 = 40/14 (5 e- NO3->N2), iO2_AOB = 48/14 (6 e- NH4->NO2),
  # iO2_NOB = 16/14 (2 e- NO2->NO3). iCharge_* = +/- 1/14000 kmol charge per g N.
  iCOD_NO3NO2:  {value: 1.1428571428571428, units: "g_COD/g_N", bounds: [0.5, 2.0], transform: none}
  iCOD_NO2N2:   {value: 1.7142857142857142, units: "g_COD/g_N", bounds: [0.5, 3.0], transform: none}
  iNO3_N2:      {value: 2.857142857142857,  units: "g_COD/g_N", bounds: [1.0, 5.0], transform: none}
  iO2_AOB:      {value: 3.4285714285714284, units: "g_O2/g_N",  bounds: [1.0, 6.0], transform: none}
  iO2_NOB:      {value: 1.1428571428571428, units: "g_O2/g_N",  bounds: [0.5, 3.0], transform: none}
  iCharge_SNHx: {value: 7.142857142857143e-05,  units: "kmol/g_N", bounds: [1.0e-6, 1.0e-3], transform: positive_log}
  iCharge_SNOx: {value: -7.142857142857143e-05, units: "kmol/g_N", bounds: [-1.0e-3, -1.0e-9], transform: none}

# Named Monod / ratio terms reused across the process rates.
expressions:
  Monod_XS_XH:    "monod_ratio([XS], [XH], KX)"
  Monod_XSTO_XH:  "monod_ratio([XSTO], [XH], KHSTO)"
  M_SO2_H:        "monod([SO2], KHO2)"
  M_SO2inh_H:     "monod_inh([SO2], KHO2inh)"
  M_SS:           "monod([SS], KHSS)"
  M_SNH4_H:       "monod([SNH4], KHNH4)"
  M_SALK_H:       "monod([SALK], KHALK)"
  M_SNO3:         "monod([SNO3], KHNO3)"
  M_SNO2:         "monod([SNO2], KHNO2)"
  M_SO2_AOB:      "monod([SO2], KAOBO2)"
  M_SNH4_AOB:     "monod([SNH4], KAOBNH4)"
  M_SO2_NOB:      "monod([SO2], KNOBO2)"
  M_SNO2_NOB:     "monod([SNO2], KNOBNO2)"
  M_SALK_N:       "monod([SALK], KNALK)"

reactions:
  # ---- Heterotrophic organisms -------------------------------------------------
  - name: Hydrolysis
    description: "Hydrolysis of XS to SS."
    rate: "kH * Monod_XS_XH * [XH]"
    stoichiometry:
      SS: "1 - fSI"
      SNH4: "(-1) * (1 - fSI) * iN_SS - fSI * iN_SI + iN_XS"
      SALK: "((-1) * (1 - fSI) * iN_SS - fSI * iN_SI + iN_XS) * iCharge_SNHx"
      SI: "fSI"
      XS: -1.0
      XSS: "(-1) * iSS_XS"

  - name: Aerobic_storage_of_SS
    description: "Aerobic storage of SS as XSTO."
    rate: "kSTO * M_SO2_H * M_SS * [XH]"
    stoichiometry:
      SO2: "(-1) * (1 - YSTOO2)"
      SS: -1.0
      SNH4: "iN_SS"
      SALK: "iN_SS * iCharge_SNHx"
      XSTO: "YSTOO2"
      XSS: "YSTOO2 * iSS_STO"

  - name: Anoxic_storage_of_SS_NO3_NO2
    description: "Anoxic storage of SS, first denitrification step (NO3 -> NO2)."
    rate: "kSTO * etaH_NO3 * M_SO2inh_H * M_SS * M_SNO3 * [XH]"
    stoichiometry:
      SS: -1.0
      SNH4: "iN_SS"
      SNO2: "(1 - YSTONO3) / iCOD_NO3NO2"
      SNO3: "(-1) * (1 - YSTONO3) / iCOD_NO3NO2"
      SALK: "iN_SS * iCharge_SNHx"
      XSTO: "YSTONO3"
      XSS: "YSTONO3 * iSS_STO"

  - name: Anoxic_storage_of_SS_NO2_N2
    description: "Anoxic storage of SS, second denitrification step (NO2 -> N2)."
    rate: "kSTO * etaH_NO2 * M_SO2inh_H * M_SS * M_SNO2 * [XH]"
    stoichiometry:
      SS: -1.0
      SNH4: "iN_SS"
      SNO2: "(-1) * (1 - YSTONO2) / iCOD_NO2N2"
      SN2: "(1 - YSTONO2) / iCOD_NO2N2"
      SALK: "iN_SS * iCharge_SNHx + (-1) * (1 - YSTONO2) / iCOD_NO2N2 * iCharge_SNOx"
      XSTO: "YSTONO2"
      XSS: "YSTONO2 * iSS_STO"

  - name: Aerobic_growth_of_XH
    description: "Aerobic growth of XH on stored XSTO."
    rate: "muH * M_SO2_H * M_SNH4_H * M_SALK_H * Monod_XSTO_XH * [XH]"
    stoichiometry:
      SO2: "(-1) * (1 - YHO2) / YHO2"
      SNH4: "(-1) * iN_BM"
      SALK: "(-1) * iN_BM * iCharge_SNHx"
      XH: 1.0
      XSTO: "(-1) / YHO2"
      XSS: "(-1) / YHO2 * iSS_STO + iSS_BM"

  - name: Anoxic_growth_of_XH_NO3_NO2
    description: "Anoxic growth of XH, first denitrification step (NO3 -> NO2)."
    rate: "muH * etaH_NO3 * M_SO2inh_H * M_SNH4_H * M_SALK_H * Monod_XSTO_XH * M_SNO3 * [XH]"
    stoichiometry:
      SNH4: "(-1) * iN_BM"
      SNO2: "(1 - YHNO3) / (iCOD_NO3NO2 * YHNO3)"
      SNO3: "(-1) * (1 - YHNO3) / (iCOD_NO3NO2 * YHNO3)"
      SALK: "(-1) * iN_BM * iCharge_SNHx"
      XH: 1.0
      XSTO: "(-1) / YHNO3"
      XSS: "(-1) / YHNO3 * iSS_STO + iSS_BM"

  - name: Anoxic_growth_of_XH_NO2_N2
    description: "Anoxic growth of XH, second denitrification step (NO2 -> N2)."
    rate: "muH * etaH_NO2 * M_SO2inh_H * M_SNH4_H * M_SALK_H * Monod_XSTO_XH * M_SNO2 * [XH]"
    stoichiometry:
      SNH4: "(-1) * iN_BM"
      SNO2: "(-1) * (1 - YHNO2) / (iCOD_NO2N2 * YHNO2)"
      SN2: "(1 - YHNO2) / (iCOD_NO2N2 * YHNO2)"
      SALK: "(-1) * iN_BM * iCharge_SNHx + (-1) * (1 - YHNO2) / (iCOD_NO2N2 * YHNO2) * iCharge_SNOx"
      XH: 1.0
      XSTO: "(-1) / YHNO2"
      XSS: "(-1) / YHNO2 * iSS_STO + iSS_BM"

  - name: Aerobic_endogenous_respiration_of_XH
    description: "Aerobic endogenous respiration of XH."
    rate: "bHO2 * M_SO2_H * [XH]"
    stoichiometry:
      SO2: "(-1) * (1 - fXI)"
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx"
      XI: "fXI"
      XH: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  - name: Anoxic_endogenous_respiration_of_XH_NO3_NO2
    description: "Anoxic endogenous respiration of XH (NO3 -> NO2)."
    rate: "bHO2 * etaH_end_NO3 * M_SO2inh_H * M_SNO3 * [XH]"
    stoichiometry:
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SNO2: "(1 - fXI) / iCOD_NO3NO2"
      SNO3: "(-1) * (1 - fXI) / iCOD_NO3NO2"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx"
      XI: "fXI"
      XH: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  - name: Anoxic_endogenous_respiration_of_XH_NO2_N2
    description: "Anoxic endogenous respiration of XH (NO2 -> N2)."
    rate: "bHO2 * etaH_end_NO2 * M_SO2inh_H * M_SNO2 * [XH]"
    stoichiometry:
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SNO2: "(-1) * (1 - fXI) / iCOD_NO2N2"
      SN2: "(1 - fXI) / iCOD_NO2N2"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx + (-1) * (1 - fXI) / iCOD_NO2N2 * iCharge_SNOx"
      XI: "fXI"
      XH: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  - name: Aerobic_respiration_of_XSTO
    description: "Aerobic respiration of XSTO."
    rate: "bSTOO2 * M_SO2_H * [XSTO]"
    stoichiometry:
      SO2: -1.0
      XSTO: -1.0
      XSS: "(-1) * iSS_STO"

  - name: Anoxic_respiration_of_XSTO_NO3_NO2
    description: "Anoxic respiration of XSTO (NO3 -> NO2)."
    rate: "bSTOO2 * etaH_end_NO3 * M_SO2inh_H * M_SNO3 * [XSTO]"
    stoichiometry:
      SNO2: "1 / iCOD_NO3NO2"
      SNO3: "(-1) / iCOD_NO3NO2"
      XSTO: -1.0
      XSS: "(-1) * iSS_STO"

  - name: Anoxic_respiration_of_XSTO_NO2_N2
    description: "Anoxic respiration of XSTO (NO2 -> N2)."
    rate: "bSTOO2 * etaH_end_NO2 * M_SO2inh_H * M_SNO2 * [XSTO]"
    stoichiometry:
      SNO2: "(-1) / iCOD_NO2N2"
      SN2: "1 / iCOD_NO2N2"
      SALK: "(-1) / iCOD_NO2N2 * iCharge_SNOx"
      XSTO: -1.0
      XSS: "(-1) * iSS_STO"

  # ---- Ammonia-oxidising bacteria (AOB) ---------------------------------------
  - name: Aerobic_growth_of_XAOB_nitritation
    description: "Aerobic growth of XAOB (nitritation, NH4 -> NO2)."
    rate: "muAOB * M_SO2_AOB * M_SNH4_AOB * M_SALK_N * [XAOB]"
    stoichiometry:
      SO2: "1 - iO2_AOB / YAOB"
      SNH4: "(-1) / YAOB - iN_BM"
      SNO2: "1 / YAOB"
      SALK: "((-1) / YAOB - iN_BM) * iCharge_SNHx + (1 / YAOB) * iCharge_SNOx"
      XAOB: 1.0
      XSS: "iSS_BM"

  - name: Aerobic_endogenous_respiration_of_XAOB
    description: "Aerobic endogenous respiration of XAOB."
    rate: "bAOB * M_SO2_H * [XAOB]"
    stoichiometry:
      SO2: "(-1) * (1 - fXI)"
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx"
      XI: "fXI"
      XAOB: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  - name: Anoxic_endogenous_respiration_of_XAOB
    description: "Anoxic endogenous respiration of XAOB (full denitrification NO3 -> N2; nitrite as intermediate negligible)."
    rate: "bAOB * etaN_end * M_SNO3 * M_SO2inh_H * [XAOB]"
    stoichiometry:
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SNO3: "(-1) * (1 - fXI) / iNO3_N2"
      SN2: "(1 - fXI) / iNO3_N2"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx + (-1) * (1 - fXI) / iNO3_N2 * iCharge_SNOx"
      XI: "fXI"
      XAOB: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  # ---- Nitrite-oxidising bacteria (NOB) ---------------------------------------
  - name: Aerobic_growth_of_XNOB_nitratation
    description: "Aerobic growth of XNOB (nitratation, NO2 -> NO3)."
    rate: "muNOB * M_SO2_NOB * M_SNO2_NOB * M_SALK_N * [XNOB]"
    stoichiometry:
      SO2: "1 - iO2_NOB / YNOB"
      SNH4: "(-1) * iN_BM"
      SNO2: "(-1) / YNOB"
      SNO3: "1 / YNOB"
      SALK: "(-1) * iN_BM * iCharge_SNHx"
      XNOB: 1.0
      XSS: "iSS_BM"

  - name: Aerobic_endogenous_respiration_of_XNOB
    description: "Aerobic endogenous respiration of XNOB."
    rate: "bNOB * M_SO2_H * [XNOB]"
    stoichiometry:
      SO2: "(-1) * (1 - fXI)"
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx"
      XI: "fXI"
      XNOB: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  - name: Anoxic_endogenous_respiration_of_XNOB
    description: "Anoxic endogenous respiration of XNOB (full denitrification NO3 -> N2)."
    rate: "bNOB * etaN_end * M_SNO3 * M_SO2inh_H * [XNOB]"
    stoichiometry:
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SNO3: "(-1) * (1 - fXI) / iNO3_N2"
      SN2: "(1 - fXI) / iNO3_N2"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx + (-1) * (1 - fXI) / iNO3_N2 * iCharge_SNOx"
      XI: "fXI"
      XNOB: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"
