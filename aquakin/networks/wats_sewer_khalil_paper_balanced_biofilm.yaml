network:
  name: wats_sewer_khalil_paper_balanced_biofilm
  version: '1.0'
  description: Layered-biofilm variant of wats_sewer_khalil_paper_balanced for use with aquakin.BiofilmReactor.
    Identical chemistry, but the three composite bulk+biofilm reactions (hydrolysis_fast/slow, fermentation)
    are split into explicit _bulk ([X_BH]) and _biofilm (eps*{X_BF}*{A_V}) halves so the reactor can run
    bulk-suspended reactions in the well-mixed bulk and biofilm reactions ({A_V}) in the depth-resolved
    layers. The lumped balanced model is the well-mixed limit of this network. Generated by _make_khalil_balanced_biofilm.py.
  references:
  - Khalil, Haroun, Santoro, Batstone & DeGroot (2025). Optimizing nitrate dosing strategies for sulfide
    control using kinetic modelling. Water Environ. Res. (Table 2 kinetics, Table 3 parameters, Figures
    2-3).
  - Hvitved-Jacobsen, Vollertsen & Nielsen (2013). Sewer Processes (WATS), 2nd ed.
  - Calabro, Mannina & Viviani (2009). In-sewer processes. Water Sci. Technol.
  - Guisasola, Sharma, Keller & Yuan (2009). Methane formation in rising main sewers. Water Res.
  - Jiang, Sharma & Yuan (2009). Sulfur transformation in rising main sewers receiving nitrate dosage.
    Water Res. 43(17), 4430-4440.
