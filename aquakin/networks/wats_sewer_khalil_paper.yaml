network:
  name: wats_sewer_khalil_paper
  version: "1.0"
  description: >
    Faithful re-implementation of the PUBLISHED sewer-process model of Khalil
    et al. (2025): the WATS model (Hvitved-Jacobsen, Vollertsen & Nielsen 2013)
    extended with the paper's nitrate-dosing additions. The paper states the
    model is "based on the WATS model" with extensions, and its Table 2 lists
    only the *key/extended* processes; the base WATS carbon backbone (growth and
    maintenance) is implied -- its maintenance rate constant q_m appears in the
    paper's Table 3 yet has no Table-2 row. This network is therefore the FULL
    WATS model (carbon backbone and complete sulfur cycle) plus the paper's
    stated additions and modifications, not only the Table-2 highlights.

    Carbon backbone (WATS): aerobic heterotrophic growth (bulk + biofilm) and
    aerobic + anoxic maintenance energy requirement, in addition to the anoxic
    (denitrifying) growth, anaerobic fast/slow hydrolysis and fermentation that
    Table 2 lists explicitly. The aerobic processes are O2-gated and therefore
    dormant under the air-sealed anaerobic/anoxic batch (S_O ~ 0); anoxic
    maintenance is active while dosed nitrate is present.

    Sulfur cycle: the full base-WATS sulfur cycle plus the paper's extensions.
    Base WATS contributes sulfate reduction and the aerobic oxidation pathway --
    pH-dependent chemical and biological *bulk* sulfide oxidation (Table 9.4) and
    biological *biofilm* sulfide / elemental-sulfur oxidation; the paper adds
    elemental-sulfur reduction, acetoclastic and hydrogenotrophic methanogenesis,
    and the two-step nitrate-driven oxidation (sulfide -> elemental sulfur ->
    sulfate), and removes the chemical oxidation of sulfide *by nitrate* (the
    anoxic oxidation is modelled as biological only). The aerobic oxidation
    pathway is O2-gated and therefore dormant in the air-sealed batch (S_O ~ 0),
    but is retained so the network is the structurally complete WATS sulfur
    cycle. As stated in the paper, the half-order WATS biofilm terms are written
    as Monod-like limiting expressions (so the aerobic biofilm oxidation here is
    Monod-ized). pH is supplied as a fixed operating condition (no charge-balance
    solver). No temperature correction (the batch is at 20 C, so the WATS
    theta^(T-20) factors are unity and are omitted).

    Carries the full WATS state vector (18 species), as in the parent
    `wats_sewer_extended.yaml`. The nitrogen, phosphorus, inorganic-carbon, methane and
    inert pools are present but largely inert in the batch -- the active
    anoxic/anaerobic reactions follow the paper's Table 2, which does not couple
    them. Differs from `wats_sewer_extended.yaml` in that it has no nitrification/
    autotroph processes (X_BA is carried but inert) and uses a fixed operating pH
    rather than the charge-balance solver.

    Documented inferences (the paper does not give an explicit stoichiometric
    matrix, only the kinetic expressions of Table 2):
      - Stoichiometry of the active reactions is derived from standard WATS/ASM
        COD-, sulfur- and nitrate-(electron-)balance conventions over the species
        the paper tracks (Table 1); the additional carried WATS pools (N, P,
        inorganic C, inerts) are not coupled into those active reactions.
      - Each combined-substrate growth row of Table 2 (rate on S_B + S_VFA) is
        written as two reactions on S_B and S_VFA whose rates sum to the
        published combined Monod term, so each substrate pool is debited
        explicitly; this is algebraically identical to the published rate.
      - The base WATS maintenance energy requirement (Eqs 5.2 / 5.29) removes
        readily biodegradable substrate (S_B + S_VFA), and the biomass itself by
        lysis when substrate is insufficient; the substrate/biomass split uses
        the WATS S-function fractions (em_frac_*). Aerobic biofilm growth uses
        the WATS half-order O2 constant k_12_o2 written in Monod form.
      - Table 2 omits any inhibition term on the two reduction reactions
        (sulfate and elemental-sulfur reduction); a nitrate-inhibition gate is
        included here, consistent with the published sulfate dynamics (sulfate
        rises while nitrate is present) and with the authors' source code.
      - The heterotroph yield is not reported numerically; the standard WATS/ASM
        value Y_H = 0.55 is used (a single yield for aerobic and anoxic growth,
        as in the paper).
      - The elemental-sulfur reduction rate is taken as printed in Table 3
        (k_s0_acid = 15.5 gS/m2/d); its physical plausibility is examined
        separately.

    A positivity limiter (a pure numerical safeguard, not a model feature)
    throttles net consumption as a species approaches zero.
  references:
  - "Khalil, Haroun, Santoro, Batstone & DeGroot (2025). Optimizing nitrate dosing strategies for sulfide control using kinetic modelling. Water Environ. Res. (Table 2 kinetics, Table 3 parameters, Figures 2-3)."
  - "Hvitved-Jacobsen, Vollertsen & Nielsen (2013). Sewer Processes (WATS), 2nd ed."
  - "Calabro, Mannina & Viviani (2009). In-sewer processes. Water Sci. Technol."
  - "Guisasola, Sharma, Keller & Yuan (2009). Methane formation in rising main sewers. Water Res."
  - "Jiang, Sharma & Yuan (2009). Sulfur transformation in rising main sewers receiving nitrate dosage. Water Res. 43(17), 4430-4440."

species:
- {name: X_BH, description: "Heterotrophic biomass (bulk)", units: gCOD/m3, default_concentration: 11.8}
- {name: X_S1, description: "Rapidly hydrolyzable substrate", units: gCOD/m3, default_concentration: 28.32}
- {name: X_S2, description: "Slowly hydrolyzable substrate", units: gCOD/m3, default_concentration: 100.84}
- {name: X_S0, description: "Elemental sulfur", units: gS/m3, default_concentration: 15.0}
- {name: S_B, description: "Readily biodegradable substrate (non-VFA)", units: gCOD/m3, default_concentration: 120.0}
- {name: S_VFA, description: "Volatile fatty acids (acetate)", units: gCOD/m3, default_concentration: 28.2}
- {name: S_H2, description: "Dissolved hydrogen", units: gCOD/m3, default_concentration: 0.0}
- {name: S_SO4, description: "Dissolved sulfate (as S)", units: gS/m3, default_concentration: 4.0}
- {name: sumS, description: "Dissolved sulfide (as S)", units: gS/m3, default_concentration: 9.0}
- {name: S_NO, description: "Dissolved nitrate (as N)", units: gN/m3, default_concentration: 30.0}
- {name: S_O, description: "Dissolved oxygen", units: gO2/m3, default_concentration: 0.0}
- {name: X_BA, description: "Autotrophic (nitrifier) biomass", units: gCOD/m3, default_concentration: 5.0}
- {name: S_NH, description: "Ammonia (as N)", units: gN/m3, default_concentration: 44.0}
- {name: S_PO4, description: "Total phosphate (as P)", units: gP/m3, default_concentration: 10.0}
- {name: S_CH4, description: "Dissolved methane", units: gCOD/m3, default_concentration: 0.0}
- {name: S_CO2, description: "Dissolved inorganic carbon (as C)", units: gC/m3, default_concentration: 20.0}
- {name: S_I, description: "Inert soluble COD (non-reactive)", units: gCOD/m3, default_concentration: 20.0}
- {name: X_I, description: "Inert particulate COD (non-reactive)", units: gCOD/m3, default_concentration: 20.0}
conditions:
- {name: A_V, description: "Biofilm area-to-volume ratio (m2/m3)", default: 56.7}
- {name: X_BF, description: "Biofilm heterotrophic biomass (gCOD/m2)", default: 10.0}
- name: pH
  description: Fixed operating pH (no charge-balance solver; used by the pH-dependent bulk sulfide-oxidation rates).
  default: 7.5
positivity_limiter:
  threshold: 1.0e-3

expressions:
  # Active heterotroph term for bulk+biofilm processes: bulk biomass plus the
  # biofilm contribution eps * X_Bf * (A/V).
  bio_hf: "[X_BH] + eps * {X_BF} * {A_V}"
  # Nitrate-inhibition gate for the reduction reactions (off while nitrate present).
  no_gate: "0.01 / ([S_NO] + 0.01)"
  # WATS maintenance S-function split: substrate is removed while available,
  # otherwise biomass is removed by lysis (em_frac_sub + em_frac_bio = 1).
  em_frac_sub: "([S_B] + [S_VFA]) / (0.1 + [S_B] + [S_VFA])"
  em_frac_bio: "0.1 / (0.1 + [S_B] + [S_VFA])"
  # Substrate split for maintenance/growth bookkeeping across the two pools.
  sb_frac: "[S_B] / ([S_B] + [S_VFA] + 1.0e-9)"
  vfa_frac: "[S_VFA] / ([S_B] + [S_VFA] + 1.0e-9)"

# --- Parameters. Values from Khalil et al. (2025) Table 3 (nominal) and Table 4
#     (calibrated); the calibrated anoxic constants carry bounds/priors.
  ho_sumS_n1: "[sumS] * ([sumS] + 1.0e-3) ** (n1 - 1.0)"
  ho_SO_n2: "[S_O] * ([S_O] + 1.0e-3) ** (n2 - 1.0)"
parameters:
  mu_h: {value: 6.7, units: "1/d", prior: {range: [4.0, 8.0]}} # Table 3 mu_H
  q_m: {value: 1.0, units: "1/d", prior: {range: [0.5, 1.0]}} # Table 3 q_m (maintenance energy requirement)
  k_12_o2: {value: 18.0, units: "gO2^0.5/m/d"}               # WATS aerobic biofilm growth constant (base WATS default; dormant under the anaerobic batch)
  eta_no: {value: 0.6, units: "-"}                           # Table 3 eta_NO
  k_sw: {value: 1.0, units: "gCOD/m3", prior: {range: [0.5, 2.0]}} # Table 3 K_sw
  k_no: {value: 2.0, units: "gN/m3"}                         # Table 3 K_NO (bulk)
  k_12_no: {value: 7.95, units: "gN/m2/d", bounds: [1.0, 30.0]}         # Table 4 k_1/2,NO (nominal 8.0)
  k_sf: {value: 5.0, units: "gCOD/m3"}                       # Table 3 K_sf
  K_NO_f: {value: 14.40, units: "gN/m3", bounds: [1.0, 30.0]}           # Table 4 K_NO,f (nominal 20)
  y_h: {value: 0.55, units: "-"}                             # heterotroph yield (not reported; WATS/ASM standard)
  eta_fe: {value: 0.21, units: "-"}                          # Table 3 eta_fe (anaerobic correction)
  k_h1: {value: 5.0, units: "1/d", prior: {range: [3.0, 8.0]}} # Table 3 k_h1 (fast hydrolysis)
  k_h2: {value: 1.5, units: "1/d", prior: {mean: 1.15, std: 1.2}} # Table 3 k_h2 (slow hydrolysis)
  k_x1: {value: 1.5, units: "gCOD/gCOD"}                     # Table 3 K_X1
  k_x2: {value: 0.5, units: "gCOD/gCOD"}                     # Table 3 K_X2
  k_o: {value: 0.05, units: "gO2/m3", prior: {range: [0.01, 0.5]}} # Table 3 K_O2
  eps: {value: 0.15, units: "-", prior: {range: [0.1, 0.2]}} # Table 3 epsilon (biofilm efficiency)
  q_ferm: {value: 3.0, units: "1/d", prior: {mean: 2.0, std: 1.2}} # Table 3 q_fe
  k_fe: {value: 10.0, units: "gCOD/m3"}                      # Table 3 K_fe
  k_h2s_acid: {value: 2.5, units: "gS/m2/d"}                 # Table 3 k_S2-,SO4 (sulfate reduction)
  k_srb: {value: 5.0, units: "gCOD/m3"}                      # Table 3 K_VFA,SRB
  k_so4: {value: 2.0, units: "gS/m3"}                        # Table 3 K_SO4
  k_s0_acid: {value: 15.5, units: "gS/m2/d"}                 # Table 3 k_S2-,S0 (elemental-S reduction; as printed)
  K_S0: {value: 1.0, units: "gS/m3", bounds: [0.1, 5.0]}     # Table 3 K_So
  k_ch4_acid: {value: 4.44, units: "gCOD/m2/d", prior: {mean: 4.44, std: 5.0}} # Table 3 k_CH4,VFA (acetoclastic)
  k_vfa_mb: {value: 1.0, units: "gCOD/m3"}                   # Table 3 K_VFA,MA
  k_ch4_hyd: {value: 1.92, units: "gCOD/m2/d"}               # Table 3 k_CH4,H2 (hydrogenotrophic)
  k_h2_mb: {value: 0.002, units: "gCOD/m3"}                  # Table 3 K_H2,MA
  k_sII_anox_f: {value: 18.45, units: "gS/m2/d", prior: {mean: 17.1, std: 2.3}, bounds: [1.0, 40.0]}  # Table 4 k_ox,S2- (Jiang 17.1+-2.3)
  K_S2: {value: 0.15, units: "gS/m3", bounds: [0.05, 5.0]}              # Table 4 K_S2- (nominal 2)
  K_NO_S_f: {value: 0.25, units: "gN/m3", bounds: [0.05, 8.0]}          # Table 4 K_NO,S,f (nominal 5)
  k_s0_anox_f: {value: 2.64, units: "gS/m2/d", prior: {mean: 2.2, std: 0.4}, bounds: [0.1, 30.0]}     # Table 4 k_ox,So (Jiang 2.2+-0.4)

  k_h2sc: {value: 0.96, units: "(gS/m3)(gO2/m3) /d"}        # aerobic chemical sulfide ox, molecular H2S
  k_hsc: {value: 12.0, units: "(gS/m3)(gO2/m3) /d"}         # aerobic chemical sulfide ox, ionic HS-
  n1: {value: 0.9, units: "-"}                              # WATS reaction order in sulfide (0.8-1.0)
  n2: {value: 0.15, units: "-"}                             # WATS reaction order in oxygen (0.1-0.2)
  k_sII_b_pHopt: {value: 19.92, units: "(gS/m3)(gO2/m3) /d"} # aerobic biological bulk sulfide ox at pH optimum
  omega_sII_b: {value: 25.0, units: "-"}                    # pH-sensitivity width, bulk bio sulfide ox
  pH_optimum: {value: 8.0, units: "-"}                      # optimum pH for bulk bio sulfide ox
  k_sII_ox_f: {value: 12.0, units: "gS/m2/d"}               # aerobic biofilm sulfide ox rate
  k_s0_ox_f: {value: 0.0, units: "gS/m2/d"}                 # aerobic elemental-S oxidation (inactive)
reactions:
- name: anox_growth_SB_bulk
  description: "Anoxic (denitrifying) heterotrophic growth on S_B, bulk water."
  rate: "eta_no * mu_h * [S_B] / (k_sw + [S_B] + [S_VFA]) * monod([S_NO], k_no) * [X_BH]"
  stoichiometry:
    S_B: "0.0 - 1.0 / y_h"
    X_BH: 1
    S_NO: "(y_h - 1.0) / (2.86 * y_h)"

- name: anox_growth_VFA_bulk
  description: "Anoxic heterotrophic growth on VFA, bulk water."
  rate: "eta_no * mu_h * [S_VFA] / (k_sw + [S_B] + [S_VFA]) * monod([S_NO], k_no) * [X_BH]"
  stoichiometry:
    S_VFA: "0.0 - 1.0 / y_h"
    X_BH: 1
    S_NO: "(y_h - 1.0) / (2.86 * y_h)"

- name: anox_growth_SB_biofilm
  description: "Anoxic heterotrophic growth on S_B, biofilm (areal, hNRB)."
  rate: "k_12_no * 2.86 * y_h / (1.0 - y_h) * [S_B] / (k_sf + [S_B] + [S_VFA]) * monod([S_NO], K_NO_f) * {A_V}"
  stoichiometry:
    S_B: "0.0 - 1.0 / y_h"
    X_BH: 1
    S_NO: "(y_h - 1.0) / (2.86 * y_h)"

- name: anox_growth_VFA_biofilm
  description: "Anoxic heterotrophic growth on VFA, biofilm (areal, hNRB)."
  rate: "k_12_no * 2.86 * y_h / (1.0 - y_h) * [S_VFA] / (k_sf + [S_B] + [S_VFA]) * monod([S_NO], K_NO_f) * {A_V}"
  stoichiometry:
    S_VFA: "0.0 - 1.0 / y_h"
    X_BH: 1
    S_NO: "(y_h - 1.0) / (2.86 * y_h)"

  # ===================== AEROBIC HETEROTROPHIC GROWTH ===================
  # Base WATS carbon backbone (Eqs 5.1, 5.3). O2-gated, hence dormant under the
  # air-sealed anaerobic/anoxic batch (S_O ~ 0); included for WATS completeness.
- name: aer_growth_SB_bulk
  description: "Aerobic heterotrophic growth on S_B, bulk water (WATS Eq 5.1)."
  rate: "mu_h * [S_B] / (k_sw + [S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH]"
  stoichiometry:
    S_B: "0.0 - 1.0 / y_h"
    X_BH: 1
    S_O: "(y_h - 1.0) / y_h"

- name: aer_growth_VFA_bulk
  description: "Aerobic heterotrophic growth on VFA, bulk water (WATS Eq 5.1)."
  rate: "mu_h * [S_VFA] / (k_sw + [S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH]"
  stoichiometry:
    S_VFA: "0.0 - 1.0 / y_h"
    X_BH: 1
    S_O: "(y_h - 1.0) / y_h"

- name: aer_growth_SB_biofilm
  description: "Aerobic heterotrophic growth on S_B, biofilm (WATS Eq 5.3, Monod form)."
  rate: "k_12_o2 * monod([S_O], k_o) * y_h / (1.0 - y_h) * [S_B] / (k_sf + [S_B] + [S_VFA]) * {A_V}"
  stoichiometry:
    S_B: "0.0 - 1.0 / y_h"
    X_BH: 1
    S_O: "(y_h - 1.0) / y_h"

- name: aer_growth_VFA_biofilm
  description: "Aerobic heterotrophic growth on VFA, biofilm (WATS Eq 5.3, Monod form)."
  rate: "k_12_o2 * monod([S_O], k_o) * y_h / (1.0 - y_h) * [S_VFA] / (k_sf + [S_B] + [S_VFA]) * {A_V}"
  stoichiometry:
    S_VFA: "0.0 - 1.0 / y_h"
    X_BH: 1
    S_O: "(y_h - 1.0) / y_h"

  # ===================== MAINTENANCE ENERGY REQUIREMENT =================
  # Base WATS maintenance (Eqs 5.2 aerobic, 5.29 anoxic). Removes readily
  # biodegradable substrate (S_B + S_VFA) and, when substrate is insufficient,
  # the biomass itself by lysis (em_frac split). Aerobic terms are O2-gated
  # (dormant in the batch); anoxic terms are active while dosed nitrate persists.
- name: maint_aer_SB_substrate
  description: "Aerobic maintenance, removing S_B (WATS Eq 5.2)."
  rate: "q_m * sb_frac * monod([S_O], k_o) * [X_BH] * em_frac_sub"
  stoichiometry: {S_B: -1, S_O: -1}
- name: maint_aer_VFA_substrate
  description: "Aerobic maintenance, removing VFA (WATS Eq 5.2)."
  rate: "q_m * vfa_frac * monod([S_O], k_o) * [X_BH] * em_frac_sub"
  stoichiometry: {S_VFA: -1, S_O: -1}
- name: maint_aer_biomass
  description: "Aerobic maintenance by biomass lysis when substrate is depleted (WATS Eq 5.2)."
  rate: "q_m * monod([S_O], k_o) * [X_BH] * em_frac_bio"
  stoichiometry: {X_BH: -1, S_O: -1}
- name: maint_anox_SB_substrate
  description: "Anoxic maintenance, removing S_B (WATS Eq 5.29)."
  rate: "q_m * sb_frac * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * em_frac_sub"
  stoichiometry: {S_B: -1, S_NO: "0.0 - 1.0 / 2.86"}
- name: maint_anox_VFA_substrate
  description: "Anoxic maintenance, removing VFA (WATS Eq 5.29)."
  rate: "q_m * vfa_frac * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * em_frac_sub"
  stoichiometry: {S_VFA: -1, S_NO: "0.0 - 1.0 / 2.86"}
- name: maint_anox_biomass
  description: "Anoxic maintenance by biomass lysis when substrate is depleted (WATS Eq 5.29)."
  rate: "q_m * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * em_frac_bio"
  stoichiometry: {X_BH: -1, S_NO: "0.0 - 1.0 / 2.86"}
- name: hydrolysis_fast
  description: "Anaerobic fast hydrolysis of rapidly hydrolyzable substrate (bulk+biofilm)."
  rate: "eta_fe * k_h1 * monod_ratio([X_S1], [X_BH], k_x1) * monod_inh([S_O], k_o) * bio_hf"
  stoichiometry: {X_S1: -1, S_B: 1}
- name: hydrolysis_slow
  description: "Anaerobic slow hydrolysis of slowly hydrolyzable substrate (bulk+biofilm)."
  rate: "eta_fe * k_h2 * monod_ratio([X_S2], [X_BH], k_x2) * monod_inh([S_O], k_o) * bio_hf"
  stoichiometry: {X_S2: -1, S_B: 1}
- name: fermentation
  description: "Fermentation of S_B to VFA + H2 (bulk+biofilm)."
  rate: "q_ferm * [S_B] / (k_fe + [S_B]) * monod_inh([S_O], k_o) * bio_hf"
  stoichiometry: {S_B: -1, S_VFA: 0.667, S_H2: 0.333}
- name: sulfate_reduction_VFA_biofilm
  description: "VFA-driven sulfate reduction to sulfide, biofilm."
  rate: "k_h2s_acid * monod([S_VFA], k_srb) * monod([S_SO4], k_so4) * no_gate * {A_V}"
  stoichiometry: {S_VFA: -2, sumS: 1, S_SO4: -1}
- name: elemental_S_reduction_VFA_biofilm
  description: "VFA-driven reduction of elemental sulfur to sulfide, biofilm."
  rate: "k_s0_acid * monod([S_VFA], k_srb) * monod([X_S0], K_S0) * no_gate * {A_V}"
  stoichiometry: {S_VFA: -0.75, sumS: 1, X_S0: -1}
- name: methanogenesis_VFA
  description: "Acetoclastic methane formation from VFA, biofilm."
  rate: "k_ch4_acid * monod([S_VFA], k_vfa_mb) * monod_inh([S_NO], K_NO_f) * {A_V}"
  stoichiometry: {S_VFA: -1, S_CH4: 1}
- name: methanogenesis_H2
  description: "Hydrogenotrophic methane formation from H2, biofilm."
  rate: "k_ch4_hyd * monod([S_H2], k_h2_mb) * monod_inh([S_NO], K_NO_f) * {A_V}"
  stoichiometry: {S_H2: -1, S_CH4: 1}
- name: sulfide_oxidation_anoxic_biofilm
  description: "Nitrate-driven biological sulfide oxidation to elemental sulfur, biofilm (soNRB)."
  rate: "k_sII_anox_f * monod([sumS], K_S2) * monod([S_NO], K_NO_S_f) * {A_V}"
  stoichiometry: {sumS: -1, X_S0: 1, S_NO: -0.175}
- name: elemental_S_oxidation_anoxic_biofilm
  description: "Nitrate-driven oxidation of elemental sulfur to sulfate, biofilm."
  rate: "k_s0_anox_f * monod([X_S0], K_S0) * monod([S_NO], K_NO_S_f) * {A_V}"
  stoichiometry: {X_S0: -1, S_SO4: 1, S_NO: -0.525}
- name: sulfide_chemoxidation_bulk
  description: "Aerobic chemical sulfide oxidation, bulk (rate const is a pH-weighted H2S/HS- average)."
  rate: "(k_h2sc * pH_switch(pKa) + k_hsc * (1.0 - pH_switch(pKa))) * ho_sumS_n1 * ho_SO_n2"
  parameters:
    pKa: {value: 7.1, units: "-"}     # H2S/HS- pKa weighting the chemical-oxidation rate
  stoichiometry: {sumS: -1, S_SO4: 1, S_O: -0.8}
- name: sulfide_biooxidation_bulk
  description: "Aerobic biological sulfide oxidation, bulk (bell-shaped pH dependence about pH_optimum)."
  rate: "k_sII_b_pHopt * omega_sII_b / (omega_sII_b + 10.0 ** ((({pH} - pH_optimum) ** 2 + 1.0e-12) ** 0.5) - 1.0) * ho_sumS_n1 * ho_SO_n2"
  stoichiometry: {sumS: -1, S_SO4: 1, S_O: -1.62}
- name: sulfide_biooxidation_aerobic_biofilm
  description: "Aerobic biological sulfide oxidation to elemental sulfur, biofilm."
  rate: "k_sII_ox_f * monod([sumS], K_S2) * monod([S_O], k_o) * {A_V}"
  stoichiometry: {sumS: -1, X_S0: 1, S_O: -0.42}
- name: elemental_S_oxidation_aerobic_biofilm
  description: "Aerobic oxidation of elemental sulfur to sulfate, biofilm (0 at default k_s0_ox_f)."
  rate: "k_s0_ox_f * monod([X_S0], K_S0) * monod([S_O], k_o) * {A_V}"
