      SNO: "(-1) / iNO3_N2"
      SN2: "1 / iNO3_N2"
      SPO: "iP_BM"
      SHCO: "iN_BM * iCharge_SNHx + iP_BM * iCharge_SPO4 + (-1) / iNO3_N2 * iCharge_SNOx"
