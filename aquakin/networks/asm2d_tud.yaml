    stoichiometry:
      SO: "(-1) + 1 / YPHA_O"
      SNH: "(-1) * iN_BM / YPHA_O"
      SPO: "(-1) * iP_BM / YPHA_O"
      SHCO: "(-1) * iN_BM / YPHA_O * iCharge_SNHx + (-1) * iP_BM / YPHA_O * iCharge_SPO4"
      XPAO: "1 / YPHA_O"
