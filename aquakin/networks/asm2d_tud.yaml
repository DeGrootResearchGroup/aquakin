      SNH: "iN_BM / YGLY_O"
      SPO: "iP_BM / YGLY_O"
      SHCO: "iN_BM / YGLY_O * iCharge_SNHx + iP_BM / YGLY_O * iCharge_SPO4"
      XPAO: "(-1) / YGLY_O"
