      SHCO: "iN_BM / YPP_NO * iCharge_SNHx + (iP_BM / YPP_NO - 1) * iCharge_SPO4 + (-1) * 1 / YPP_NO / iNO3_N2 * iCharge_SNOx + iCharge_XPAO_PP"
