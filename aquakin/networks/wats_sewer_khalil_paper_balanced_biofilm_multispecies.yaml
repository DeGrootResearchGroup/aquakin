reactions:
- name: anox_growth_SB
  description: Anoxic (denitrifying) heterotrophic growth on S_B, bulk water.
  rate: eta_no * mu_h * [S_B] / (k_sw + [S_B] + [S_VFA]) * monod([S_NO], k_no) * [X_BH]
  stoichiometry:
    S_B: 0.0 - 1.0 / y_h
    X_BH: 1
    S_NO: (y_h - 1.0) / (2.86 * y_h)
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: anox_growth_VFA
  description: Anoxic heterotrophic growth on VFA, bulk water.
  rate: eta_no * mu_h * [S_VFA] / (k_sw + [S_B] + [S_VFA]) * monod([S_NO], k_no) * [X_BH]
  stoichiometry:
    S_VFA: 0.0 - 1.0 / y_h
    X_BH: 1
    S_NO: (y_h - 1.0) / (2.86 * y_h)
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: aer_growth_SB
  description: Aerobic heterotrophic growth on S_B, bulk water (WATS Eq 5.1).
  rate: mu_h * [S_B] / (k_sw + [S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH]
  stoichiometry:
    S_B: 0.0 - 1.0 / y_h
    X_BH: 1
    S_O: (y_h - 1.0) / y_h
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: aer_growth_VFA
  description: Aerobic heterotrophic growth on VFA, bulk water (WATS Eq 5.1).
  rate: mu_h * [S_VFA] / (k_sw + [S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH]
  stoichiometry:
    S_VFA: 0.0 - 1.0 / y_h
    X_BH: 1
    S_O: (y_h - 1.0) / y_h
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: maint_aer_SB_substrate
  description: Aerobic maintenance, removing S_B (WATS Eq 5.2).
  rate: q_m * sb_frac * monod([S_O], k_o) * [X_BH] * em_frac_sub
  stoichiometry:
    S_B: -1
    S_O: -1
- name: maint_aer_VFA_substrate
  description: Aerobic maintenance, removing VFA (WATS Eq 5.2).
  rate: q_m * vfa_frac * monod([S_O], k_o) * [X_BH] * em_frac_sub
  stoichiometry:
    S_VFA: -1
    S_O: -1
- name: maint_aer_biomass
  description: Aerobic maintenance by biomass lysis when substrate is depleted (WATS Eq 5.2).
  rate: q_m * monod([S_O], k_o) * [X_BH] * em_frac_bio
  stoichiometry:
    X_BH: -1
    S_O: -1
    S_NH: i_n_bio
    S_PO4: i_p_bio
- name: maint_anox_SB_substrate
  description: Anoxic maintenance, removing S_B (WATS Eq 5.29).
  rate: q_m * sb_frac * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * em_frac_sub
  stoichiometry:
    S_B: -1
    S_NO: 0.0 - 1.0 / 2.86
- name: maint_anox_VFA_substrate
  description: Anoxic maintenance, removing VFA (WATS Eq 5.29).
  rate: q_m * vfa_frac * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * em_frac_sub
  stoichiometry:
    S_VFA: -1
    S_NO: 0.0 - 1.0 / 2.86
- name: maint_anox_biomass
  description: Anoxic maintenance by biomass lysis when substrate is depleted (WATS Eq 5.29).
  rate: q_m * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * em_frac_bio
  stoichiometry:
    X_BH: -1
    S_NO: 0.0 - 1.0 / 2.86
    S_NH: i_n_bio
    S_PO4: i_p_bio
- name: hydrolysis_fast
  description: Anaerobic fast hydrolysis of rapidly hydrolyzable substrate (bulk+biofilm).
  rate: eta_fe * k_h1 * monod_ratio([X_S1], [X_BH], k_x1) * monod_inh([S_O], k_o) * [X_BH]
  stoichiometry:
    X_S1: -1
    S_B: 1
    S_NH: i_n_xb
- name: hydrolysis_slow
  description: Anaerobic slow hydrolysis of slowly hydrolyzable substrate (bulk+biofilm).
  rate: eta_fe * k_h2 * monod_ratio([X_S2], [X_BH], k_x2) * monod_inh([S_O], k_o) * [X_BH]
  stoichiometry:
    X_S2: -1
    S_B: 1
    S_NH: i_n_xb
- name: fermentation
  description: Fermentation of S_B to VFA + H2 (bulk+biofilm).
  rate: q_ferm * [S_B] / (k_fe + [S_B]) * monod_inh([S_O], k_o) * [X_BH]
  stoichiometry:
    S_B: -1
    S_VFA: 0.667
    S_H2: 0.333
- name: sulfate_reduction
  description: Sulfide formation on fermentable substrate S_B (VFA accumulates as byproduct; peer review).
  rate: mu_srb * monod([S_B], k_srb) * monod([S_SO4], K_SO4) * no_gate * [X_SRB]
  stoichiometry:
    X_SRB: 1
    S_B: 0.0 - 1.0 / Y_srb
    sumS: (1.0 - Y_srb) / (2.0 * Y_srb)
    S_SO4: 0.0 - (1.0 - Y_srb) / (2.0 * Y_srb)
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: elemental_S_reduction
  description: Sulfide formation on fermentable substrate S_B (VFA accumulates as byproduct; peer review).
  rate: mu_srb_s0 * monod([S_B], k_srb) * monod([X_S0], K_S0) * no_gate * [X_SRB]
  stoichiometry:
    X_SRB: 1
    S_B: 0.0 - 1.0 / Y_srb
    sumS: 2.0 * (1.0 - Y_srb) / Y_srb
    X_S0: 0.0 - 2.0 * (1.0 - Y_srb) / Y_srb
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: methanogenesis_VFA
  description: Acetoclastic methane formation from VFA, biofilm.
  rate: mu_ma * monod([S_VFA], k_vfa_mb) * monod_inh([S_NO], K_NO_f) * [X_MA]
  stoichiometry:
    X_MA: 1
    S_VFA: 0.0 - 1.0 / Y_ma
    S_CH4: (1.0 - Y_ma) / Y_ma
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: methanogenesis_H2
  description: Hydrogenotrophic methane formation from H2, biofilm.
  rate: mu_ma_h2 * monod([S_H2], k_h2_mb) * monod_inh([S_NO], K_NO_f) * [X_MA]
  stoichiometry:
    X_MA: 1
    S_H2: 0.0 - 1.0 / Y_ma_h2
    S_CH4: (1.0 - Y_ma_h2) / Y_ma_h2
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: sulfide_oxidation_anoxic
  description: Nitrate-driven biological sulfide oxidation to elemental sulfur, biofilm (soNRB).
  rate: mu_sob * monod([sumS], K_S2) * monod([S_NO], K_NO_S_f) * [X_SOB]
  stoichiometry:
    X_SOB: 1
    sumS: 0.0 - 2.0 / Y_sob
    X_S0: 2.0 / Y_sob
    S_NO: 0.0 - (1.0 / Y_sob - 1.0) / 2.86
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: elemental_S_oxidation_anoxic
  description: Nitrate-driven oxidation of elemental sulfur to sulfate, biofilm.
  rate: mu_sob_s0 * monod([X_S0], K_S0) * monod([S_NO], K_NO_S_f) * [X_SOB]
  stoichiometry:
    X_SOB: 1
    X_S0: 0.0 - 2.0 / (3.0 * Y_sob)
    S_SO4: 2.0 / (3.0 * Y_sob)
    S_NO: 0.0 - (1.0 / Y_sob - 1.0) / 2.86
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: sulfide_chemoxidation
  description: Aerobic chemical sulfide oxidation, bulk (rate const is a pH-weighted H2S/HS- average).
  rate: (k_h2sc * pH_switch(pKa) + k_hsc * (1.0 - pH_switch(pKa))) * ho_sumS_n1 * ho_SO_n2
  parameters:
    pKa:
      value: 7.1
      units: '-'
  stoichiometry:
    sumS: -1
    S_SO4: 1
    S_O: -2.0
- name: sulfide_biooxidation
  description: Aerobic biological sulfide oxidation, bulk (bell-shaped pH dependence about pH_optimum).
  rate: k_sII_b_pHopt * omega_sII_b / (omega_sII_b + 10.0 ** ((({pH} - pH_optimum) ** 2 + 1.0e-12) **
    0.5) - 1.0) * ho_sumS_n1 * ho_SO_n2
  stoichiometry:
    sumS: -1
    S_SO4: 1
    S_O: -2.0
- name: sulfide_biooxidation_aerobic
  description: Aerobic biological sulfide oxidation to elemental sulfur, biofilm.
  rate: mu_sob_aer * monod([sumS], K_S2) * monod([S_O], k_o) * [X_SOB]
  stoichiometry:
    X_SOB: 1
    sumS: 0.0 - 2.0 / Y_sob
    X_S0: 2.0 / Y_sob
    S_O: 0.0 - (1.0 / Y_sob - 1.0)
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: elemental_S_oxidation_aerobic
  description: Aerobic oxidation of elemental sulfur to sulfate, biofilm (0 at default k_s0_ox_f).
  rate: mu_sob_s0_aer * monod([X_S0], K_S0) * monod([S_O], k_o) * [X_SOB]
  stoichiometry:
    X_SOB: 1
    X_S0: 0.0 - 2.0 / (3.0 * Y_sob)
    S_SO4: 2.0 / (3.0 * Y_sob)
    S_O: 0.0 - (1.0 / Y_sob - 1.0)
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
- name: FeS_precipitation
  description: 'Precipitation of dissolved sulfide with ferrous iron to solid FeS (Nielsen et al. 2005).
    Iron-limited second-order rate; mass fractions per g FeS: Fe 56/88, S 32/88.'
  rate: k_fes_p * [S_Fe2] * [sumS]
  stoichiometry:
    S_Fe2: -0.6364
    sumS: -0.3636
    X_FeS: 1
- name: decay_srb
  description: First-order decay (inactivation) of X_SRB to inert.
  rate: b_srb * [X_SRB]
  stoichiometry:
    X_SRB: -1
    X_I: 1
    S_NH: i_n_bio
    S_PO4: i_p_bio
- name: decay_ma
  description: First-order decay (inactivation) of X_MA to inert.
  rate: b_ma * [X_MA]
  stoichiometry:
    X_MA: -1
    X_I: 1
    S_NH: i_n_bio
    S_PO4: i_p_bio
- name: decay_sob
  description: First-order decay (inactivation) of X_SOB to inert.
  rate: b_sob * [X_SOB]
  stoichiometry:
    X_SOB: -1
    X_I: 1
    S_NH: i_n_bio
    S_PO4: i_p_bio
