network:
  name: wats_sewer_khalil_paper_balanced_biofilm_multispecies
  version: '1.0'
  description: 'Full multispecies depth-resolved biofilm model: the sulfur and methane processes are driven
    by their own per-layer growing/decaying biomass (X_SRB sulfate/elemental-S reducers, X_MA methanogens,
    X_SOB sulfide-oxidisers) rather than the heterotroph X_BH. Each process keeps its Monod form but grows
    its group at a literature yield with COD/S/N-conserving stoichiometry; each group decays first-order
    to inert. Run with aquakin.BiofilmReactor (biofilm_reactions=None), a stratified initial state, and
    fixed_mask holding only X_I. Generated by networks/_make_khalil_balanced_biofilm_multispecies.py from
    the increment-1 _biofilm_biomass model.'
  references:
  - Khalil, Haroun, Santoro, Batstone & DeGroot (2025). Optimizing nitrate dosing strategies for sulfide
    control using kinetic modelling. Water Environ. Res. (Table 2 kinetics, Table 3 parameters, Figures
    2-3).
  - Hvitved-Jacobsen, Vollertsen & Nielsen (2013). Sewer Processes (WATS), 2nd ed.
  - Calabro, Mannina & Viviani (2009). In-sewer processes. Water Sci. Technol.
  - Guisasola, Sharma, Keller & Yuan (2009). Methane formation in rising main sewers. Water Res.
  - Jiang, Sharma & Yuan (2009). Sulfur transformation in rising main sewers receiving nitrate dosage.
    Water Res. 43(17), 4430-4440.
