- name: anox_hydrolysis_XS1_biofilm
  description: Anoxic hydrolysis of XS1, biofilm.
  rate: eta_no * k_h1 * monod_ratio([X_S1], [X_BH], k_x1) * monod_inh([S_O], k_o) * monod([S_NO], k_no)
    * {X_BF} * eps * theta_f * {A_V}
  stoichiometry:
    X_S1: -1
