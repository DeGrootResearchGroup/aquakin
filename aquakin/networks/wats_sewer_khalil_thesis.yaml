    S_SO4: i_s_xb - i_s_sb
- name: maint_aer_SB_substrate
  description: Aerobic energy maintenance on S_B (substrate-oxidation path).
  rate: q_m * [S_B] / ([S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH] * theta_w * em_frac_sub
  stoichiometry:
    S_B: -1
    S_O: -1
    S_CO2: 0.375
- name: maint_aer_SB_biomass
  description: Aerobic energy maintenance on S_B (endogenous-biomass path).
  rate: q_m * [S_B] / ([S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH] * theta_w * em_frac_bio
  stoichiometry:
    X_BH: -1
    S_O: -1
    S_CO2: 0.375
- name: maint_aer_VFA_substrate
  description: Aerobic energy maintenance on VFA (substrate-oxidation path).
  rate: q_m * [S_VFA] / ([S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH] * theta_w * em_frac_sub
  stoichiometry:
    S_VFA: -1
    S_O: -1
    S_CO2: 0.375
- name: maint_aer_VFA_biomass
  description: Aerobic energy maintenance on VFA (endogenous-biomass path).
  rate: q_m * [S_VFA] / ([S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH] * theta_w * em_frac_bio
  stoichiometry:
    X_BH: -1
    S_O: -1
    S_CO2: 0.375
- name: maint_anox_SB_substrate
  description: Anoxic energy maintenance on S_B (substrate-oxidation path).
  rate: q_m * [S_B] / ([S_B] + [S_VFA]) * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * theta_w
    * em_frac_sub
  stoichiometry:
    S_B: -1
    S_NO: 0.0 - 1.0 / 2.86
    S_CO2: 0.375
- name: maint_anox_SB_biomass
  description: Anoxic energy maintenance on S_B (endogenous-biomass path).
  rate: q_m * [S_B] / ([S_B] + [S_VFA]) * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * theta_w
    * em_frac_bio
  stoichiometry:
    X_BH: -1
    S_NO: 0.0 - 1.0 / 2.86
    S_CO2: 0.375
- name: maint_anox_VFA_substrate
  description: Anoxic energy maintenance on VFA (substrate-oxidation path).
  rate: q_m * [S_VFA] / ([S_B] + [S_VFA]) * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * theta_w
    * em_frac_sub
  stoichiometry:
    S_VFA: -1
    S_NO: 0.0 - 1.0 / 2.86
    S_CO2: 0.375
- name: maint_anox_VFA_biomass
  description: Anoxic energy maintenance on VFA (endogenous-biomass path).
  rate: q_m * [S_VFA] / ([S_B] + [S_VFA]) * monod_inh([S_O], k_o) * monod([S_NO], k_no) * [X_BH] * theta_w
    * em_frac_bio
  stoichiometry:
    X_BH: -1
    S_NO: 0.0 - 1.0 / 2.86
    S_CO2: 0.375
- name: fermentation_bulk
  description: Fermentation of S_B to VFA + H2, bulk water.
  rate: q_ferm * [S_B] / ([S_B] + k_fe) * monod_inh([S_O], k_o) * monod_inh([S_NO], k_no) * [X_BH] * theta_w
  stoichiometry:
    S_B: -1
    S_VFA: 0.667
    S_H2: 0.333
    S_SO4: i_s_sb
    S_CO2: 0.125
- name: fermentation_biofilm
  description: Fermentation of S_B to VFA + H2, biofilm.
  rate: q_ferm * [S_B] / ([S_B] + k_fe) * monod_inh([S_O], k_o) * monod_inh([S_NO], k_no) * eps * {X_BF}
    * theta_w * {A_V}
  stoichiometry:
    S_B: -1
    S_VFA: 0.667
    S_H2: 0.333
    S_SO4: i_s_sb
    S_CO2: 0.125
- name: methanogenesis_VFA
  description: Acetoclastic methane formation, biofilm.
  rate: k_ch4_acid * monod([S_VFA], k_vfa_mb) * monod_inh([S_O], k_o) * monod_inh([S_NO], k_no) * theta_s
    * {A_V}
  stoichiometry:
    S_VFA: -1
    S_CH4: 1
    S_CO2: 0.19
- name: methanogenesis_H2
  description: Hydrogenotrophic methane formation, biofilm.
  rate: k_ch4_hyd * monod([S_H2], k_h2_mb) * monod_inh([S_O], k_o) * monod_inh([S_NO], k_no) * theta_s
    * {A_V}
  stoichiometry:
    S_H2: -1
    S_CH4: 1
    S_CO2: -0.19
- name: sulfate_reduction_VFA_bulk
  description: Sulfate reduction on VFA, bulk water (0 at default mu_h2s_acid).
  rate: mu_h2s_acid * [X_BH] * [S_VFA] / ([S_VFA] + [S_H2] + k_srb) * monod([S_SO4], k_so4) * monod_inh([S_O],
    k_o) * monod_inh([S_NO], k_no) * theta_s
  stoichiometry:
    S_VFA: -2
    sumS: 1
    S_SO4: -1
    S_CO2: 0.38
- name: sulfate_reduction_H2_bulk
  description: Sulfate reduction on H2, bulk water (0 at default mu_h2s_hyd).
  rate: mu_h2s_hyd * [X_BH] * [S_H2] / ([S_VFA] + [S_H2] + k_srb) * monod([S_SO4], k_so4) * monod_inh([S_O],
    k_o) * monod_inh([S_NO], k_no) * theta_s
  stoichiometry:
    S_H2: -2
    sumS: 1
    S_SO4: -1
- name: sulfate_reduction_VFA_biofilm
  description: Sulfate reduction on VFA, biofilm (sulfide generation).
  rate: k_h2s_acid * [S_VFA] / ([S_VFA] + [S_H2] + k_srb) * monod([S_SO4], k_so4) * monod_inh([S_O], k_o)
    * (0.01 / ([S_NO] + 0.01)) * theta_s * {A_V}
  stoichiometry:
    S_VFA: -2
    sumS: 1
    S_SO4: -1
    S_CO2: 0.38
- name: sulfate_reduction_H2_biofilm
  description: Sulfate reduction on H2, biofilm (0 at default k_h2s_hyd).
  rate: k_h2s_hyd * [S_H2] / ([S_VFA] + [S_H2] + k_srb) * monod([S_SO4], k_so4) * monod_inh([S_O], k_o)
    * monod_inh([S_NO], k_no) * theta_s * {A_V}
  stoichiometry:
    S_H2: -2
    sumS: 1
    S_SO4: -1
- name: elemental_S_reduction_VFA_biofilm
  description: Reduction of elemental sulfur to sulfide on VFA, biofilm.
  rate: k_s0_acid * [S_VFA] / ([S_VFA] + [S_H2] + k_srb) * monod([X_S0], K_S0) * monod_inh([S_O], k_o)
    * (0.01 / ([S_NO] + 0.01)) * theta_s * {A_V}
  stoichiometry:
    S_VFA: -0.5
    sumS: 1
    X_S0: -1
- name: elemental_S_reduction_H2_biofilm
  description: Reduction of elemental sulfur to sulfide on H2, biofilm (0 at default k_s0_hyd).
  rate: k_s0_hyd * [S_H2] / ([S_VFA] + [S_H2] + k_srb) * monod([X_S0], K_S0) * monod_inh([S_O], k_o) *
    monod_inh([S_NO], k_no) * theta_s * {A_V}
  stoichiometry:
    S_H2: -0.5
    sumS: 1
    X_S0: -1
- name: sulfide_chemoxidation_bulk
  description: Aerobic chemical sulfide oxidation, bulk (rate const is a pH-weighted H2S/HS- average).
  rate: (k_h2sc * pH_switch(pKa) + k_hsc * (1.0 - pH_switch(pKa))) * ho_sumS_n1 * ho_SO_n2
  parameters:
    pKa:
      value: 7.1
      units: '-'
  stoichiometry:
    sumS: -1
    S_SO4: 1
    S_O: -2.0
- name: sulfide_biooxidation_bulk
  description: Aerobic biological sulfide oxidation, bulk (bell-shaped pH dependence about pH_optimum).
  rate: k_sII_b_pHopt * omega_sII_b / (omega_sII_b + 10.0 ** ((({pH} - pH_optimum) ** 2 + 1.0e-12) **
    0.5) - 1.0) * ho_sumS_n1 * ho_SO_n2
  stoichiometry:
    sumS: -1
    S_SO4: 1
    S_O: -2.0
- name: sulfide_biooxidation_aerobic_biofilm
  description: Aerobic biological sulfide oxidation to elemental sulfur, biofilm.
  rate: k_sII_ox_f * ho_sumS_half * ho_SO_half * {A_V}
  stoichiometry:
    sumS: -1
    X_S0: 1
    S_O: -0.5
- name: sulfide_biooxidation_anoxic_biofilm
  description: Nitrate-driven biological sulfide oxidation to elemental sulfur, biofilm (soNRB).
  rate: k_sII_anox_f * monod([sumS], K_S2) * monod([S_NO], K_NO_S_f) * {A_V}
  stoichiometry:
    sumS: -1
    X_S0: 1
    S_NO: -0.175
- name: elemental_S_oxidation_aerobic_biofilm
  description: Aerobic oxidation of elemental sulfur to sulfate, biofilm (0 at default k_s0_ox_f).
  rate: k_s0_ox_f * ho_XS0_half * ho_SO_half * {A_V}
  stoichiometry:
    X_S0: -1
    S_SO4: 1
    S_O: -1.5
- name: elemental_S_oxidation_anoxic_biofilm
  description: Nitrate-driven oxidation of elemental sulfur to sulfate, biofilm.
  rate: k_s0_anox_f * monod([X_S0], K_S0) * monod([S_NO], K_NO_S_f) * {A_V}
  stoichiometry:
    X_S0: -1
    S_SO4: 1
    S_NO: -0.525
