reactions:
- name: aer_growth_SB_bulk
  description: Aerobic heterotrophic growth on S_B, bulk water.
  rate: mu_h * [S_B] / (k_sw + [S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH] * theta_w
  stoichiometry:
    S_B: 0.0 - 1.0 / y_hw
    X_BH: 1
    S_O: (y_hw - 1.0) / y_hw
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
    S_SO4: (1.0 / y_hw) * i_s_sb - i_s_bio
    S_CO2: i_cit_sb / y_hw - i_cit_bio
- name: anox_growth_SB_bulk
  description: Anoxic (denitrifying) heterotrophic growth on S_B, bulk water.
  rate: eta_no * mu_h * [S_B] / (k_sw + [S_B] + [S_VFA]) * monod([S_NO], k_no) * monod_inh([S_O], k_o)
    * [X_BH] * theta_w
  stoichiometry:
    S_B: 0.0 - 1.0 / y_h_anox
    X_BH: 1
    S_NO: (y_h_anox - 1.0) / (2.86 * y_h_anox)
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
    S_SO4: (1.0 / y_h_anox) * i_s_sb - i_s_bio
    S_CO2: i_cit_sb / y_h_anox - i_cit_bio
- name: aer_growth_VFA_bulk
  description: Aerobic heterotrophic growth on VFA, bulk water.
  rate: mu_h * [S_VFA] / (k_sw + [S_B] + [S_VFA]) * monod([S_O], k_o) * [X_BH] * theta_w
  stoichiometry:
    S_VFA: 0.0 - 1.0 / y_hw
    X_BH: 1
    S_O: (y_hw - 1.0) / y_hw
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
    S_SO4: 0.0 - i_s_bio
    S_CO2: i_cit_sb / y_hw - i_cit_bio
- name: anox_growth_VFA_bulk
  description: Anoxic heterotrophic growth on VFA, bulk water.
  rate: eta_no * mu_h * [S_VFA] / (k_sw + [S_B] + [S_VFA]) * monod([S_NO], k_no) * monod_inh([S_O], k_o)
    * [X_BH] * theta_w
  stoichiometry:
    S_VFA: 0.0 - 1.0 / y_h_anox
    X_BH: 1
    S_NO: (y_h_anox - 1.0) / (2.86 * y_h_anox)
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
    S_SO4: 0.0 - i_s_bio
    S_CO2: i_cit_sb / y_h_anox - i_cit_bio
- name: aer_growth_SB_biofilm
  description: Aerobic heterotrophic growth on S_B, biofilm (half-order in O2 via Monod S_O/(2+S_O)).
  rate: k_12_o2 * [S_O] / (2.0 + [S_O]) * y_hf / (1.0 - y_hf) * [S_B] / (k_sf + [S_B] + [S_VFA]) * theta_f
    * {A_V}
  stoichiometry:
    S_B: 0.0 - 1.0 / y_hf
    X_BH: 1
    S_O: (y_hf - 1.0) / y_hf
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
    S_SO4: (1.0 / y_hf) * i_s_sb - i_s_bio
    S_CO2: i_cit_sb / y_hw - i_cit_bio
- name: anox_growth_SB_biofilm
  description: Anoxic heterotrophic growth on S_B, biofilm.
  rate: k_12_no * [S_NO] / (K_NO_f + [S_NO]) * 2.86 * y_h_anox / (1.0 - y_h_anox) * [S_B] / (k_sf + [S_B]
    + [S_VFA]) * monod_inh([S_O], k_o) * theta_f * {A_V}
  stoichiometry:
    S_B: 0.0 - 1.0 / y_h_anox
    X_BH: 1
    S_NO: (y_h_anox - 1.0) / (2.86 * y_h_anox)
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
    S_SO4: (1.0 / y_h_anox) * i_s_sb - i_s_bio
    S_CO2: i_cit_sb / y_h_anox - i_cit_bio
- name: aer_growth_VFA_biofilm
  description: Aerobic heterotrophic growth on VFA, biofilm.
  rate: k_12_o2 * [S_O] / (2.0 + [S_O]) * y_hf / (1.0 - y_hf) * [S_VFA] / (k_sf + [S_B] + [S_VFA]) * theta_f
    * {A_V}
  stoichiometry:
    S_VFA: 0.0 - 1.0 / y_hf
    X_BH: 1
    S_O: (y_hf - 1.0) / y_hf
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
    S_SO4: 0.0 - i_s_bio
    S_CO2: i_cit_sb / y_hw - i_cit_bio
- name: anox_growth_VFA_biofilm
  description: Anoxic heterotrophic growth on VFA, biofilm.
  rate: k_12_no * [S_NO] / (K_NO_f + [S_NO]) * 2.86 * y_h_anox / (1.0 - y_h_anox) * [S_VFA] / (k_sf +
    [S_B] + [S_VFA]) * monod_inh([S_O], k_o) * theta_f * {A_V}
  stoichiometry:
    S_VFA: 0.0 - 1.0 / y_h_anox
    X_BH: 1
    S_NO: (y_h_anox - 1.0) / (2.86 * y_h_anox)
    S_NH: 0.0 - i_n_bio
    S_PO4: 0.0 - i_p_bio
    S_SO4: 0.0 - i_s_bio
    S_CO2: i_cit_sb / y_h_anox - i_cit_bio
- name: aer_hydrolysis_XS1_bulk
  description: Aerobic hydrolysis of rapidly hydrolysable substrate, bulk.
  rate: k_h1 * monod_ratio([X_S1], [X_BH], k_x1) * monod([S_O], k_o) * [X_BH] * theta_w
  stoichiometry:
    X_S1: -1
    S_B: 1
    S_NH: i_n_xb
    S_SO4: i_s_xb - i_s_sb
- name: anox_hydrolysis_XS1_bulk
  description: Anoxic hydrolysis of XS1, bulk.
  rate: eta_no * k_h1 * monod_ratio([X_S1], [X_BH], k_x1) * monod_inh([S_O], k_o) * monod([S_NO], k_no)
    * [X_BH] * theta_w
  stoichiometry:
    X_S1: -1
    S_B: 1
    S_NH: i_n_xb
    S_SO4: i_s_xb - i_s_sb
- name: anae_hydrolysis_XS1_bulk
  description: Anaerobic hydrolysis of XS1, bulk.
  rate: eta_an * k_h1 * monod_ratio([X_S1], [X_BH], k_x1) * monod_inh([S_O], k_o) * monod_inh([S_NO],
    k_no) * [X_BH] * theta_w
  stoichiometry:
    X_S1: -1
    S_B: 1
    S_NH: i_n_xb
    S_SO4: i_s_xb - i_s_sb
- name: aer_hydrolysis_XS1_biofilm
  description: Aerobic hydrolysis of XS1, biofilm.
  rate: k_h1 * monod_ratio([X_S1], [X_BH], k_x1) * monod([S_O], k_o) * {X_BF} * eps * theta_f * {A_V}
  stoichiometry:
