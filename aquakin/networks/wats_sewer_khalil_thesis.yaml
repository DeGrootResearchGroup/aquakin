# Auto-generated from wats_sewer_extended.yaml by _make_khalil_thesis.py -- do not edit by hand.
network:
  name: wats_sewer_khalil_thesis
  version: '0.2'
  description: 'Complete WATS sewer-process model (Hvitved-Jacobsen, Vollertsen & Nielsen 2013, Tables
    9.1-9.4: aerobic/anoxic/anaerobic heterotrophic carbon turnover -- growth bulk+biofilm on fermentable
    substrate and VFA, maintenance, fast/slow hydrolysis in all redox regimes, fermentation -- plus the
    sulfur cycle: sulfate reduction and chemical/biological sulfide oxidation in bulk and biofilm) extended
    with Khalil''s thesis Table 4-1 nitrate-dosing additions (methanogenesis, elemental-sulfur reduction,
    and nitrate-driven two-step sulfide->S0->sulfate oxidation). Same reaction structure as wats_sewer_extended,
    with the non-WATS/non-thesis pieces removed (charge-balance pH solver replaced by a fixed operating
    pH; nitrification/autotrophs dropped) and parameters reverted to thesis/paper values (single yield
    0.55; k_h1=12, k_h2=5; q_ferm=2; Table 4-1 sulfur kinetics). Generated by _make_khalil_thesis.py to
    test reproduction of the published batch nitrate-dosing results.'
  references:
  - Khalil et al. (2025). Optimizing nitrate dosing strategies for sulfide control. Water Environ. Res.
  - Hvitved-Jacobsen, Vollertsen & Nielsen (2013). Sewer Processes (WATS), 2nd ed. (hydrolysis, growth,
    saturation constants, temperature coefficients).
  - 'Calabro, Mannina & Viviani (2009). In-sewer processes: model development and sensitivity analysis.
    Water Sci. Technol. (fermentation, anaerobic correction).'
  - Guisasola, Sharma, Keller & Yuan (2009). Development of a model for assessing methane formation in
    rising main sewers. Water Res. (methanogenesis, sulfate reduction).
  - Jiang, Leung, Li, Chen & Okabe (2009). A biofilm model for prediction of pollutant transformation
    in sewers. Water Res.
  - Jiang, Sharma & Yuan (2009). Sulfur transformation in rising main sewers receiving nitrate dosage.
    Water Res. 43(17), 4430-4440 (anoxic sulfide/elemental-sulfur oxidation and reduction rates).
