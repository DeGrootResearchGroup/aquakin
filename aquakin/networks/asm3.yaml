network:
  name: asm3
  version: "1.0"
  description: >
    Imported from ASM3.xlsm
  references:
    - ""

species:
  - {name: SO2, default_concentration: 1.0, units: "g_O2/m3", description: "Dissolved oxygen (O2)"}
  - {name: SS, default_concentration: 1.0, units: "g_COD/m3", description: "Soluble biodegradable organics"}
  - {name: SNH4, default_concentration: 1.0, units: "g_N/m3", description: "Ammonia (NH4+ + NH3)"}
  - {name: SNOX, default_concentration: 1.0, units: "g_N/m3", description: "Nitrate and nitrite (NO3 + NO2)"}
  - {name: SN2, default_concentration: 1.0, units: "g_N/m3", description: "Dissolved nitrogen (N2)"}
  - {name: SALK, default_concentration: 1.0, units: "kmol/m3", description: "Alkalinity (HCO3-)"}
  - {name: SI, default_concentration: 1.0, units: "g_COD/m3", description: "Soluble undegradable organics"}
  - {name: XI, default_concentration: 1.0, units: "g_COD/m3", description: "Particulate unbiodegradable organics"}
  - {name: XS, default_concentration: 1.0, units: "g_COD/m3", description: "Particulate biodegradable organics"}
  - {name: XH, default_concentration: 1.0, units: "g_COD/m3", description: "Ordinary heterotrophic organisms (OHO)"}
  - {name: XSTO, default_concentration: 1.0, units: "g_COD/m3", description: "Storage compound in OHOs"}
  - {name: XA, default_concentration: 1.0, units: "g_COD/m3", description: "Autotrophic nitrifying organisms (NH4+ to NO3-)"}
  - {name: XSS, default_concentration: 1.0, units: "g_TSS/m3", description: "Total suspended solids (TSS)"}

conditions:
  - {name: T, default: 293.15, description: "Temperature (K)."}

parameters:
  KALK: {value: 0.0001, transform: positive_log, bounds: [1e-06, 0.01], units: "kmol/m3"}
  KA_O2: {value: 0.5, transform: positive_log, bounds: [0.005, 50.0], units: "g_O2/m3"}
  KNH4: {value: 0.01, transform: positive_log, bounds: [0.0001, 1.0], units: "g_N/m3"}
  # Autotroph-specific ammonia / alkalinity half-saturations (the import had
  # collapsed the nitrifier growth Monod terms onto the heterotroph values).
  KA_NH4: {value: 1.0, transform: positive_log, bounds: [0.01, 100.0], units: "g_N/m3"}
  KA_ALK: {value: 0.0005, transform: positive_log, bounds: [5e-06, 0.05], units: "kmol/m3"}
  KNOX: {value: 0.5, transform: positive_log, bounds: [0.005, 50.0], units: "g_N/m3"}
  KO2: {value: 0.2, transform: positive_log, bounds: [0.002, 20.0], units: "g_O2/m3"}
  KS: {value: 2.0, transform: positive_log, bounds: [0.02, 200.0], units: "g_COD/m3"}
  KSTO: {value: 1.0, transform: positive_log, bounds: [0.01, 100.0], units: "-"}
  KX: {value: 1.0, transform: positive_log, bounds: [0.01, 100.0], units: "-"}
  YA: {value: 0.24, transform: positive_log, bounds: [0.0024, 24.0], units: "g_COD/g_N"}
  YH_NOX: {value: 0.54, transform: positive_log, bounds: [0.0054, 54.0], units: "g_COD/g_COD"}
  YH_O2: {value: 0.63, transform: positive_log, bounds: [0.0063, 63.0], units: "g_COD/g_COD"}
  YSTO_NOX: {value: 0.8, transform: positive_log, bounds: [0.008, 80.0], units: "g_COD/g_COD"}
  YSTO_O2: {value: 0.85, transform: positive_log, bounds: [0.0085, 85.0], units: "g_COD/g_COD"}
  bA_NOX: {value: 0.05, transform: positive_log, bounds: [0.0005, 5.0], units: "1/d"}
  bA_O2: {value: 0.15, transform: positive_log, bounds: [0.0015, 15.0], units: "1/d"}
  bH_NOX: {value: 0.1, transform: positive_log, bounds: [0.001, 10.0], units: "1/d"}
  bH_O2: {value: 0.2, transform: positive_log, bounds: [0.002, 20.0], units: "1/d"}
  bSTO_NOX: {value: 0.1, transform: positive_log, bounds: [0.001, 10.0], units: "1/d"}
  bSTO_O2: {value: 0.2, transform: positive_log, bounds: [0.002, 20.0], units: "1/d"}
  etaNOX: {value: 0.6, transform: positive_log, bounds: [0.006, 60.0], units: "-"}
  fSI: {value: 0.0, transform: none, bounds: [0.0, 1e-09], units: "-"}
  fXI: {value: 0.2, transform: positive_log, bounds: [0.002, 20.0], units: "-"}
  iCOD_NO3: {value: -4.571428571428571, transform: none, bounds: [-9.142857142857142, 1e-09], units: "g_COD/g_N"}
  iCharge_SNHx: {value: 7.14285714285714e-05, transform: positive_log, bounds: [7.142857142857139e-07, 0.007142857142857139], units: "mol/g_N"}
  iCharge_SNOx: {value: -7.14285714285714e-05, transform: none, bounds: [-0.0001428571428571428, 1e-09], units: "mol/g_N"}
  iNO3_N2: {value: 2.857142857142857, transform: positive_log, bounds: [0.02857142857142857, 285.7142857142857], units: "-"}
  iN_BM: {value: 0.07, transform: positive_log, bounds: [0.0007000000000000001, 7.000000000000001], units: "g_N/g_COD"}
  iN_SI: {value: 0.01, transform: positive_log, bounds: [0.0001, 1.0], units: "g_N/g_COD"}
  iN_SS: {value: 0.03, transform: positive_log, bounds: [0.0003, 3.0], units: "g_N/g_COD"}
  iN_XI: {value: 0.02, transform: positive_log, bounds: [0.0002, 2.0], units: "g_N/g_COD"}
  iN_XS: {value: 0.04, transform: positive_log, bounds: [0.0004, 4.0], units: "g_N/g_COD"}
  iSS_BM: {value: 0.9, transform: positive_log, bounds: [0.009000000000000001, 90.0], units: "g_TSS/g_COD"}
  iSS_STO: {value: 0.6, transform: positive_log, bounds: [0.006, 60.0], units: "g_TSS/g_COD"}
  iSS_XI: {value: 0.75, transform: positive_log, bounds: [0.0075, 75.0], units: "g_TSS/g_COD"}
  iSS_XS: {value: 0.75, transform: positive_log, bounds: [0.0075, 75.0], units: "g_TSS/g_COD"}
  kH: {value: 3.0, transform: positive_log, bounds: [0.03, 300.0], units: "1/d"}
  muA: {value: 1.0, transform: positive_log, bounds: [0.01, 100.0], units: "1/d"}
  muH: {value: 2.0, transform: positive_log, bounds: [0.02, 200.0], units: "1/d"}
  qSTO: {value: 5.0, transform: positive_log, bounds: [0.05, 500.0], units: "1/d"}

expressions:
  Monod_XS_over_XH: "monod_ratio([XS], [XH], KX)"
  Monod_SO2: "monod([SO2], KO2)"
  Monod_SS: "monod([SS], KS)"
  Monod_KO2: "monod_inh([SO2], KO2)"
  Monod_SNOX: "monod([SNOX], KNOX)"
  Monod_SNH4: "monod([SNH4], KNH4)"
  Monod_SALK: "monod([SALK], KALK)"
  Monod_XSTO_over_XH: "monod_ratio([XSTO], [XH], KSTO)"
  Monod_KA_O2: "monod_inh([SO2], KA_O2)"
  # Autotroph-specific saturation terms (own half-saturation constants).
  Monod_SO2_A: "monod([SO2], KA_O2)"
  Monod_SNH4_A: "monod([SNH4], KA_NH4)"
  Monod_SALK_A: "monod([SALK], KA_ALK)"

reactions:
  - name: Hydrolysis
    description: "Hydrolysis"
    rate: "kH * Monod_XS_over_XH * [XH]"
    stoichiometry:
      SS: "1 - fSI"
      SNH4: "(-1) * (1 - fSI) * iN_SS - fSI * iN_SI + iN_XS"
      SALK: "((-1) * (1 - fSI) * iN_SS - fSI * iN_SI + iN_XS) * iCharge_SNHx"
      SI: "fSI"
      XS: -1.0
      XSS: "(-1) * iSS_XS"

  - name: Aerobic_storage_of_XSTO
    description: "Aerobic storage of XSTO"
    rate: "qSTO * Monod_SO2 * Monod_SS * [XH]"
    stoichiometry:
      SO2: "(-1) * (1 - YSTO_O2)"
      SS: -1.0
      SNH4: "iN_SS"
      SALK: "iN_SS * iCharge_SNHx"
      XSTO: "YSTO_O2"
      XSS: "YSTO_O2 * iSS_STO"

  - name: Anoxic_storage_of_XSTO
    description: "Anoxic storage of XSTO"
    rate: "qSTO * etaNOX * Monod_KO2 * Monod_SNOX * Monod_SS * [XH]"
    stoichiometry:
      SS: -1.0
      SNH4: "iN_SS"
      SNOX: "(-1) * (1 - YSTO_NOX) / iNO3_N2"
      SN2: "(1 - YSTO_NOX) / iNO3_N2"
      SALK: "iN_SS * iCharge_SNHx + (-1) * (1 - YSTO_NOX) / iNO3_N2 * iCharge_SNOx"
      XSTO: "YSTO_NOX"
      XSS: "YSTO_NOX * iSS_STO"

  - name: Aerobic_growth_of_XH
    description: "Aerobic growth of XH"
    rate: "muH * Monod_SO2 * Monod_SNH4 * Monod_SALK * Monod_XSTO_over_XH * [XH]"
    stoichiometry:
      SO2: "(-1) * (1 - YH_O2) / YH_O2"
      SNH4: "(-1) * iN_BM"
      SALK: "(-1) * iN_BM * iCharge_SNHx"
      XH: 1.0
      XSTO: "(-1) / YH_O2"
      XSS: "(-1) / YH_O2 * iSS_STO + iSS_BM"

  - name: Anoxic_growth_of_XH_denitrification
    description: "Anoxic growth of XH (denitrification)"
    rate: "muH * etaNOX * Monod_KO2 * Monod_SNOX * Monod_SNH4 * Monod_SALK * Monod_XSTO_over_XH * [XH]"
    stoichiometry:
      SNH4: "(-1) * iN_BM"
      SNOX: "(-1) * (1 - YH_NOX) / YH_NOX * 1 / iNO3_N2"
      SN2: "(1 - YH_NOX) / YH_NOX * 1 / iNO3_N2"
      SALK: "(-1) * iN_BM * iCharge_SNHx + (-1) * (1 - YH_NOX) / YH_NOX * 1 / iNO3_N2 * iCharge_SNOx"
      XH: 1.0
      XSTO: "(-1) / YH_NOX"
      XSS: "(-1) / YH_NOX * iSS_STO + iSS_BM"

  - name: Aerobic_endogenous_respiration_of_XH
    description: "Aerobic endogenous respiration of XH"
    rate: "bH_O2 * Monod_SO2 * [XH]"
    stoichiometry:
      SO2: "(-1) * (1 - fXI)"
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx"
      XI: "fXI"
      XH: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  - name: Anoxic_endogenous_respiration_of_XH
    description: "Anoxic endogenous respiration of XH"
    rate: "bH_NOX * Monod_KO2 * Monod_SNOX * [XH]"
    stoichiometry:
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SNOX: "(-1) * (1 - fXI) / iNO3_N2"
      SN2: "(1 - fXI) / iNO3_N2"
      SALK: "(-1) * (1 - fXI) / iNO3_N2 * iCharge_SNOx + ((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx"
      XI: "fXI"
      XH: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  - name: Aerobic_respiration_of_XSTO
    description: "Aerobic respiration of XSTO"
    rate: "bSTO_O2 * Monod_SO2 * [XSTO]"
    stoichiometry:
      SO2: -1.0
      XSTO: -1.0
      XSS: "(-1) * iSS_STO"

  - name: Anoxic_respiration_of_XSTO
    description: "Anoxic respiration of XSTO"
    rate: "bSTO_NOX * Monod_KO2 * Monod_SNOX * [XSTO]"
    stoichiometry:
      SNOX: "(-1) / iNO3_N2"
      SN2: "1 / iNO3_N2"
      SALK: "(-1) / iNO3_N2 * iCharge_SNOx"
      XSTO: -1.0
      XSS: "(-1) * iSS_STO"

  - name: Growth_of_autotrophic_nitrifying_organisms
    description: "Growth of autotrophic nitrifying organisms"
    rate: "muA * Monod_SO2_A * Monod_SNH4_A * Monod_SALK_A * [XA]"
    stoichiometry:
      SO2: "(-1) * ((-1) * iCOD_NO3 - YA) / YA"
      SNH4: "(-1) / YA - iN_BM"
      SNOX: "1 / YA"
      SALK: "((-1) / YA - iN_BM) * iCharge_SNHx + 1 / YA * iCharge_SNOx"
      XA: 1.0
      XSS: "iSS_BM"

  - name: Aerobic_endogenous_respiration_of_XA
    description: "Aerobic endogenous respiration of XA"
    rate: "bA_O2 * Monod_SO2_A * [XA]"
    stoichiometry:
      SO2: "(-1) * (1 - fXI)"
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx"
      XI: "fXI"
      XA: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  - name: Anoxic_endogenous_respiration_of_XA
    description: "Anoxic endogenous respiration of XA"
    rate: "bA_NOX * Monod_KA_O2 * Monod_SNOX * [XA]"
    stoichiometry:
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SNOX: "(-1) * (1 - fXI) / iNO3_N2"
      SN2: "(1 - fXI) / iNO3_N2"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx + (-1) * (1 - fXI) / iNO3_N2 * iCharge_SNOx"
      XI: "fXI"
      XA: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

