model:
  name: asm3_2step_comammox
  # Inherit the two-step nitrification model and add a complete-ammonia-oxidiser
  # (comammox) organism that competes with the AOB/NOB for ammonium. Additive
  # extends layer; see schema/inheritance.py.
  extends: asm3_2step
  version: "1.0"
  description: >
    asm3_2step extended with a complete-ammonia-oxidising (comammox) organism,
    parameterised from Kits et al. (2017) for Nitrospira inopinata.

    Comammox is a single organism that performs COMPLETE nitrification --
    ammonium straight to nitrate (NH4 -> NO3), the original single-step ASM3
    autotroph stoichiometry -- rather than the AOB/NOB division of labour. Its
    defining trait is an **oligotrophic lifestyle**: a very high affinity for
    ammonia (K_NH4 ~ 0.012 gN/m3, ~10x the AOB affinity in asm3_2step) combined
    with a low maximum oxidation rate. The competition this creates is the point
    of the model: comammox out-competes the AOB at LOW ammonium (its high
    affinity dominates), while the canonical AOB win at HIGH ammonium (their
    higher maximum rate dominates) -- the documented niche differentiation.

    The complete-nitrification stoichiometry is the original ASM3 autotroph,
    expressed symbolically: oxygen demand is the full NH4->NO3 value (the AOB
    nitritation + NOB nitratation demands inherited from asm3_2step sum to it),
    and nitrate is produced directly. COD, N and charge close to machine
    precision. Everything else -- the AOB, NOB, heterotrophs and endogenous
    respiration -- is inherited from asm3_2step unchanged.

    NOTE: there is no settled canonical activated-sludge comammox process matrix
    in the literature; this model is a defensible synthesis (single-organism
    complete nitrification on the asm3_2step backbone + the Kits 2017 oligotrophic
    kinetics), not a faithful reproduction of one published Gujer matrix. Comammox
    can also leak nitrite (its nitrite affinity is poor; Kits 2017 Fig 2), which a
    two-internal-step variant could capture -- here it is modelled as complete
    nitrification with no nitrite release.
  references:
    - "Kits, K.D., Sedlacek, C.J., Lebedeva, E.V., et al. (2017). Kinetic analysis of a complete nitrifier reveals an oligotrophic lifestyle. Nature 549(7671), 269-272."
    - "Daims, H., Lebedeva, E.V., Pjevac, P., et al. (2015). Complete nitrification by Nitrospira bacteria. Nature 528(7583), 504-509."

species:
  - {name: XCMX, default_concentration: 10.0, units: "g_COD/m3", description: "Complete ammonia oxidisers (comammox Nitrospira)"}

parameters:
  # Oligotroph: high ammonia affinity (K_NH4_CMX ~ 0.012 gN/m3, Kits 2017), low
  # maximum rate (below the AOB max so the AOB win at high ammonium). Growth
  # carries a nitrifier-like temperature dependency (optimum ~37 C).
  mu_CMX:     {value: 0.5,   units: "1/d", bounds: [0.05, 2.0], transform: positive_log, temperature: {theta: 1.10, ref_T: 293.15}}
  b_CMX_O2:   {value: 0.10,  units: "1/d", bounds: [0.01, 1.0], transform: positive_log}
  K_NH4_CMX:  {value: 0.012, units: "g_N/m3",  bounds: [0.001, 0.5], transform: positive_log}
  K_O2_CMX:   {value: 0.5,   units: "g_O2/m3", bounds: [0.05, 5.0],  transform: positive_log}
  # Complete-nitrifier yield (g COD biomass / g NH4-N); higher than canonical
  # nitrifiers (comammox conserves the full 8-electron oxidation; Kits 2017).
  Y_CMX:      {value: 0.20,  units: "g_COD/g_N", bounds: [0.05, 0.5], transform: logit}

expressions:
  M_SNH4_CMX: "monod([SNH4], K_NH4_CMX)"
  M_SO2_CMX:  "monod([SO2], K_O2_CMX)"

reactions:
  - name: Complete_nitrification_by_XCMX
    description: "Comammox complete nitrification: NH4 -> NO3 in one organism (oligotrophic, high NH4 affinity)."
    rate: "mu_CMX * M_SO2_CMX * M_SNH4_CMX * M_SALK_N * [XCMX]"
    stoichiometry:
      SO2: "1 - (iO2_AOB + iO2_NOB) / Y_CMX"
      SNH4: "(-1) / Y_CMX - iN_BM"
      SNO3: "1 / Y_CMX"
      SALK: "((-1) / Y_CMX - iN_BM) * iCharge_SNHx + (1 / Y_CMX) * iCharge_SNOx"
      XCMX: 1.0
      XSS: "iSS_BM"

  - name: Aerobic_endogenous_respiration_of_XCMX
    description: "Aerobic endogenous respiration of comammox biomass."
    rate: "b_CMX_O2 * M_SO2_H * [XCMX]"
    stoichiometry:
      SO2: "(-1) * (1 - fXI)"
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx"
      XI: "fXI"
      XCMX: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"

  - name: Anoxic_endogenous_respiration_of_XCMX
    description: "Anoxic endogenous respiration of comammox biomass (full denitrification NO3 -> N2)."
    rate: "b_CMX_O2 * etaN_end * M_SNO3 * M_SO2inh_H * [XCMX]"
    stoichiometry:
      SNH4: "(-1) * fXI * iN_XI + iN_BM"
      SNO3: "(-1) * (1 - fXI) / iNO3_N2"
      SN2: "(1 - fXI) / iNO3_N2"
      SALK: "((-1) * fXI * iN_XI + iN_BM) * iCharge_SNHx + (-1) * (1 - fXI) / iNO3_N2 * iCharge_SNOx"
      XI: "fXI"
      XCMX: -1.0
      XSS: "(-1) * iSS_BM + fXI * iSS_XI"
