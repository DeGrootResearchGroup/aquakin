# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  # Match the CI docs build: any Sphinx warning (a broken xref, a doc missing
  # from the toctree, an autodoc import failure) fails the build.
  fail_on_warning: true

# Install the package with its `docs` extra so autodoc can import aquakin and
# the Sphinx toolchain (myst-parser, pydata-sphinx-theme, ...) is available.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
